name: Trigger Dependabot
description: >
  Trigger on-demand Dependabot updates in any repository via repository_dispatch.
  The target repo must have a dependabot-on-demand.yml receiver workflow.
  For cross-repo triggers, pass a PAT with contents:write scope.

inputs:
  repo:
    description: 'Target repository (owner/name). Defaults to current repo.'
    required: false
    default: ${{ github.repository }}
  token:
    description: 'GitHub token. Use a PAT for cross-repo triggers.'
    required: false
    default: ${{ github.token }}
  source:
    description: >
      Repository whose release triggered this update. Forwarded in the
      dispatch payload so the receiver can name it in the trigger commit
      message. Defaults to the repository running this action.
    required: false
    default: ${{ github.repository }}

runs:
  using: composite
  steps:
    - name: Dispatch trigger-dependabot event
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TARGET_REPO: ${{ inputs.repo }}
        SOURCE_REPO: ${{ inputs.source }}
      run: |
        set -euo pipefail
        echo "🔔 Triggering Dependabot in ${TARGET_REPO} (from ${SOURCE_REPO})..."
        jq -n --arg src "$SOURCE_REPO" \
          '{event_type: "trigger-dependabot", client_payload: {source_repository: $src}}' \
          | gh api --method POST "/repos/${TARGET_REPO}/dispatches" --input -
        echo "✅ Dispatched to ${TARGET_REPO}"
