name: Dependabot auto-merge

on:
  workflow_dispatch:
  pull_request_target:
  workflow_call:
    inputs:
      match_pattern:
        description: Regex of status check names to wait for before auto-merging. Only triggered checks are awaited; unmatched/non-triggered ones are skipped.
        required: false
        default: 'test|discover|go'
        type: string
      wait-delay:
        description: Seconds to wait before the first poll, giving triggered checks time to register their check runs.
        required: false
        default: 60
        type: number
    secrets:
      github-token:
        description: Token with `pull_requests:write` and `contents:write` permissions
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  wait_for_checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Wait for check is finished
        id: wait_for_checks
        uses: poseidon/wait-for-status-checks@899c768d191b56eef585c18f8558da19e1f3e707 # v0.6.0
        with:
          token: ${{ secrets.github-token != '' && secrets.github-token || github.token }}
          match_pattern: ${{ inputs.match_pattern != '' && inputs.match_pattern || 'test|discover|go' }}
          delay: ${{ inputs.wait-delay || 60 }}
          interval: 10
          timeout: 600
  dependabot:
    needs: [wait_for_checks]
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.github-token != '' && secrets.github-token || github.token }}
      # github_actions majors automerge too, except glue actions whose outputs feed
      # other jobs and which never run in PR CI - their majors stay manual.
      - name: Enable auto-merge for Dependabot PRs
        if: >-
          ${{ steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
              steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
              (steps.metadata.outputs.update-type == 'version-update:semver-major' &&
               steps.metadata.outputs.package-ecosystem == 'github_actions' &&
               !contains(steps.metadata.outputs.dependency-names, 'dorny/paths-filter') &&
               !contains(steps.metadata.outputs.dependency-names, 'dependabot/fetch-metadata') &&
               !contains(steps.metadata.outputs.dependency-names, 'poseidon/wait-for-status-checks') &&
               !contains(steps.metadata.outputs.dependency-names, 'release-drafter/release-drafter')) }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{ secrets.github-token != '' && secrets.github-token || github.token }}
