name: sync-sponsors

# Reusable workflow that refreshes the GitHub Sponsors tier sections
# in a repo's top-level README. Caller wrappers in each gofiber repo
# stay ~10 lines.
#
# The README must contain two marker pairs at the desired insert spots
# inside an HTML <table> (we use HTML instead of markdown table because
# markdown tables break when HTML comments live between rows):
#
#   <table>
#     <thead><tr><th></th><th>User</th><th>Sponsorship</th></tr></thead>
#     <tbody>
#       <!-- guardian --><!-- guardian -->
#       <!-- supporter --><!-- supporter -->
#     </tbody>
#   </table>
#
# The org-level secret SPONSORS_TOKEN must hold a classic PAT created by
# a gofiber org owner with read:user + read:org scopes. The default
# GITHUB_TOKEN cannot read org-level Sponsors data.
#
# Two tier steps = two GraphQL calls per run, well within rate limits.
# `active-only: false` includes one-time donations (the org has many
# of those and the colleague's reference table also lists them).

on:
  workflow_call:
    inputs:
      file:
        description: 'README path within the calling repo'
        type: string
        default: 'README.md'
      guardian-template:
        description: 'Mustache row template for the guardian tier (HTML <tr>; markdown table breaks on inline HTML comments, so we use an HTML table)'
        type: string
        default: "<tr><td align=\"center\"><img src=\"{{{ avatarUrl }}}\" width=\"40\" /></td><td><a href=\"{{{ websiteUrl }}}\">@{{{ login }}}</a></td><td>🔥 Fiber Guardian</td></tr>\n"
      supporter-template:
        description: 'Mustache row template for the supporter tier'
        type: string
        default: "<tr><td align=\"center\"><img src=\"{{{ avatarUrl }}}\" width=\"40\" /></td><td><a href=\"{{{ websiteUrl }}}\">@{{{ login }}}</a></td><td>☕ Fiber Supporter</td></tr>\n"
      guardian-minimum:
        description: 'Lower bound (cents) for the guardian tier'
        type: number
        default: 10000
      supporter-minimum:
        description: 'Lower bound (cents) for the supporter tier'
        type: number
        default: 1
      supporter-maximum:
        description: 'Upper bound (cents) for the supporter tier'
        type: number
        default: 9999
      guardian-fallback:
        type: string
        default: '<tr><td colspan="3"><em>Be the first Fiber Guardian and <a href="https://github.com/sponsors/gofiber">sponsor gofiber</a>.</em></td></tr>'
      supporter-fallback:
        type: string
        default: '<tr><td colspan="3"><em>Be the first Fiber Supporter and <a href="https://github.com/sponsors/gofiber">sponsor gofiber</a>.</em></td></tr>'
      commit-message:
        type: string
        default: 'docs(readme): sync GitHub Sponsors'
    secrets:
      sponsors-token:
        description: 'PAT with read:user + read:org scopes (gofiber org owner account)'
        required: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Use the SPONSORS_TOKEN PAT for the checkout so the subsequent
          # `git push` authenticates as the PAT owner (an org owner) and
          # can write to the default branch even when branch protection
          # rejects pushes from github-actions[bot]. Note: pushes by a
          # PAT do trigger other on-push workflows; that is intentional.
          token: ${{ secrets.sponsors-token }}

      - name: Sync guardian tier
        uses: JamesIves/github-sponsors-readme-action@2fd9142e765f755780202122261dc85e78459405 # v1.6.0
        with:
          token: ${{ secrets.sponsors-token }}
          file: ${{ inputs.file }}
          marker: guardian
          minimum: ${{ inputs.guardian-minimum }}
          organization: true
          active-only: false
          template: ${{ inputs.guardian-template }}
          fallback: ${{ inputs.guardian-fallback }}

      - name: Sync supporter tier
        uses: JamesIves/github-sponsors-readme-action@2fd9142e765f755780202122261dc85e78459405 # v1.6.0
        with:
          token: ${{ secrets.sponsors-token }}
          file: ${{ inputs.file }}
          marker: supporter
          minimum: ${{ inputs.supporter-minimum }}
          maximum: ${{ inputs.supporter-maximum }}
          organization: true
          active-only: false
          template: ${{ inputs.supporter-template }}
          fallback: ${{ inputs.supporter-fallback }}

      - name: Commit README updates
        env:
          FILE: ${{ inputs.file }}
          MSG: ${{ inputs.commit-message }}
        run: |
          set -e
          if git diff --quiet --exit-code -- "$FILE"; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "$MSG"
          git push
