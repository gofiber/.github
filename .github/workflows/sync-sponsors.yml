name: sync-sponsors

# Reusable workflow that refreshes the gofiber Sponsors table in a repo's
# top-level README. Caller wrappers in each gofiber repo stay ~10 lines.
#
# The README must contain ONE marker pair at the desired insert spot inside
# an HTML <table> (we use HTML instead of a markdown table because markdown
# tables break when HTML comments live between rows):
#
#   <table>
#     <thead><tr><th></th><th>User</th><th>Sponsorship</th></tr></thead>
#     <tbody>
#       <!-- sponsors-table -->
#       <!-- sponsors-table -->
#     </tbody>
#   </table>
#
# The org-level secret SPONSORS_TOKEN must hold a classic PAT created by a
# gofiber org owner with read:user + read:org + repo scopes. read:user is
# required because the action queries the privacyLevel and createdAt fields
# on each sponsorship; without it the whole GraphQL request is rejected and
# zero sponsors come back. read:org is required for organization-level
# sponsorships. repo is required because the same PAT is used for the git
# push that lands the README change on protected branches.
#
# The central sync_sponsors.py script lives alongside the existing sync_docs
# script in this repo at .github/scripts/. Tier names are pulled from each
# tier's description on github.com/sponsors/<org>, so renaming or adding a
# tier on the platform is automatically reflected in the next sync run with
# no code change.

on:
  workflow_call:
    inputs:
      file:
        description: 'README path within the calling repo'
        type: string
        default: 'README.md'
      commit-message:
        description: 'Commit message for the README update'
        type: string
        default: 'docs(readme): sync GitHub Sponsors'
    secrets:
      sponsors-token:
        description: 'PAT with read:user + read:org + repo scopes (gofiber org owner account)'
        required: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # SPONSORS_TOKEN drives the subsequent `git push` so it can land on
          # protected default branches that reject github-actions[bot].
          token: ${{ secrets.sponsors-token }}

      - name: Checkout central scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: gofiber/.github
          path: .central

      - name: Render sponsors table
        env:
          SPONSORS_TOKEN: ${{ secrets.sponsors-token }}
          ORG: ${{ github.repository_owner }}
          FILE: ${{ inputs.file }}
        run: python3 .central/.github/scripts/sync_sponsors.py

      - name: Commit README updates
        env:
          FILE: ${{ inputs.file }}
          MSG: ${{ inputs.commit-message }}
        run: |
          set -e
          if git diff --quiet --exit-code -- "$FILE"; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "$MSG"
          git push
