name: sync-sponsors

# Reusable workflow that refreshes the gofiber Sponsors table in a repo's
# top-level README. Caller wrappers in each gofiber repo stay ~10 lines.
#
# The README must contain ONE marker pair at the desired insert spot inside
# an HTML <table> (we use HTML instead of a markdown table because markdown
# tables break when HTML comments live between rows):
#
#   <table>
#     <thead><tr><th></th><th>User</th><th>Sponsorship</th></tr></thead>
#     <tbody>
#       <!-- sponsors-table -->
#       <!-- sponsors-table -->
#     </tbody>
#   </table>
#
# The org-level secret SPONSORS_TOKEN must hold a classic PAT created by a
# gofiber org owner with read:user + read:org + repo scopes. read:user is
# required because the action queries the privacyLevel and createdAt fields
# on each sponsorship; without it the whole GraphQL request is rejected and
# zero sponsors come back. read:org is required for organization-level
# sponsorships. repo is required because the same PAT is used for the git
# push that lands the README change on protected branches.
#
# The central sync_sponsors.py script lives alongside the existing sync_docs
# script in this repo at .github/scripts/. Tier names are pulled from each
# tier's description on github.com/sponsors/<org>, so renaming or adding a
# tier on the platform is automatically reflected in the next sync run with
# no code change.

on:
  workflow_call:
    inputs:
      file:
        description: 'README path(s) within the calling repo, one per line. Multiple paths are rendered and committed together in a single commit.'
        type: string
        default: 'README.md'
      commit-message:
        description: 'Commit message for the README update'
        type: string
        default: 'docs(readme): sync GitHub Sponsors'
    secrets:
      sponsors-token:
        description: 'PAT with read:user + read:org + repo scopes (gofiber org owner account)'
        required: true

permissions:
  contents: write

# Serialize runs per calling repo so a manual dispatch and the scheduled run
# never push to the same branch at the same time.
concurrency:
  group: sync-sponsors-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # SPONSORS_TOKEN drives the subsequent `git push` so it can land on
          # protected default branches that reject github-actions[bot].
          token: ${{ secrets.sponsors-token }}

      - name: Checkout central scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: gofiber/.github
          path: .central

      - name: Render sponsors table
        env:
          SPONSORS_TOKEN: ${{ secrets.sponsors-token }}
          ORG: ${{ github.repository_owner }}
          FILES: ${{ inputs.file }}
        run: |
          set -euo pipefail
          # `file` may hold several paths (one per line); render each in turn.
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            echo "Rendering sponsors into $path"
            FILE="$path" python3 .central/.github/scripts/sync_sponsors.py
          done <<< "$FILES"

      - name: Commit README updates
        env:
          FILES: ${{ inputs.file }}
          MSG: ${{ inputs.commit-message }}
        run: |
          set -euo pipefail
          # Collect every rendered file that actually changed, then land them
          # all in ONE commit and ONE push. This avoids the per-file race that
          # a job-per-file matrix hit when two pushes targeted the same branch.
          changed=()
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if ! git diff --quiet --exit-code -- "$path"; then
              changed+=("$path")
            fi
          done <<< "$FILES"
          if [ ${#changed[@]} -eq 0 ]; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${changed[@]}"
          git commit -m "$MSG"
          # Push once. If the branch moved underneath us (a maintainer merge or
          # another workflow), rebase our single commit on top and retry so the
          # update still lands as exactly one commit. A failed or conflicted
          # rebase must not abort the step under `set -e`: clean it up and let
          # the loop try again, falling through to a clear error if all attempts
          # are exhausted (the next scheduled run re-renders from a fresh tree).
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing on latest and retrying."
            if ! git pull --rebase; then
              git rebase --abort || true
            fi
          done
          echo "Failed to push sponsors update after multiple attempts." >&2
          exit 1
