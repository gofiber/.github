name: Test release-gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/scripts/release-gate.sh
      - .github/scripts/test/**
      - .github/workflows/test-release-gate.yml
      - .github/workflows/weekly-release.yml
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run release-gate tests
        run: bash .github/scripts/test/test-release-gate.sh
