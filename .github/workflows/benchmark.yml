name: benchmark

on:
  workflow_call:
    inputs:
      go-version:
        description: Go version passed to actions/setup-go
        required: false
        default: 1.25.x
        type: string
      multi-module:
        description: Run the benchmarks of every top-level directory that contains a go.mod (multi-module repos)
        required: false
        default: false
        type: boolean
      working-directory:
        description: Directory to run the benchmarks in (single-module mode)
        required: false
        default: '.'
        type: string
      benchmark-data-dir-path:
        description: Directory on the gh-pages branch where the benchmark data is stored
        required: false
        default: benchmarks
        type: string
      max-items-in-chart:
        description: >-
          Number of runs kept in the gh-pages data.js. Pick roughly the amount of
          default-branch pushes in 3 months; this also keeps the file well below
          GitHub's 100 MB per-file push limit (the action never prunes by default).
        required: true
        type: number
      alert-threshold:
        description: Regression threshold at which an alert is raised
        required: false
        default: 150%
        type: string
      filter-parallel:
        description: Drop Benchmark*_Parallel results before processing
        required: false
        default: false
        type: boolean
      go-force-package-suffix:
        description: Always append the Go package to the benchmark names (keep whatever format the existing chart history uses)
        required: false
        default: false
        type: boolean
      go-test-flags:
        description: Extra flags passed to go test
        required: false
        default: ''
        type: string
      setup-script:
        description: Repo-local script run before the benchmarks; receives the working directory as $1 and may append to $GITHUB_ENV
        required: false
        default: ''
        type: string
      sync-pages:
        description: Sync the shared benchmark page to gh-pages after publishing (disable in matrix legs and sync once afterwards)
        required: false
        default: true
        type: boolean
      timeout-minutes:
        description: Job timeout in minutes
        required: false
        default: 30
        type: number

permissions:
  # deployments permission to deploy GitHub pages website
  deployments: write
  # contents permission to update benchmark contents in gh-pages branch
  contents: write
  # allow posting comments to pull request
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Fetch Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # to be able to resolve the default branch head

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ inputs.go-version }}
          # per-module cache key for matrix legs; all modules for the loop mode
          cache-dependency-path: ${{ inputs.multi-module && '**/go.sum' || format('{0}/go.sum', inputs.working-directory) }}

      - name: Run Setup Script
        if: inputs.setup-script != ''
        shell: bash
        env:
          SETUP_SCRIPT: ${{ inputs.setup-script }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash "$SETUP_SCRIPT" "$WORKING_DIRECTORY"

      - name: Run Benchmarks (multi-module)
        if: inputs.multi-module
        shell: bash
        env:
          GO_TEST_FLAGS: ${{ inputs.go-test-flags }}
        run: |
          set -euo pipefail
          : > "$GITHUB_WORKSPACE/output.txt"
          for d in */ ; do
            if [[ ! -f "${d}go.mod" ]]; then
              continue
            fi
            (
              cd "$d"
              # shellcheck disable=SC2086 # GO_TEST_FLAGS is intentionally word-split
              go test ./... -benchmem -run=^$ -bench . $GO_TEST_FLAGS
            ) | tee -a "$GITHUB_WORKSPACE/output.txt"
          done

      - name: Run Benchmarks
        if: ${{ !inputs.multi-module }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          GO_TEST_FLAGS: ${{ inputs.go-test-flags }}
        run: |
          set -o pipefail
          # shellcheck disable=SC2086 # GO_TEST_FLAGS is intentionally word-split
          go test ./... -benchmem -run=^$ -bench . $GO_TEST_FLAGS | tee "$GITHUB_WORKSPACE/output.txt"

      - name: Remove Parallel Benchmarks
        if: inputs.filter-parallel
        shell: bash
        run: |
          awk '!/^Benchmark.*_Parallel/' output.txt > output_filtered.txt
          mv output_filtered.txt output.txt

      # NOTE: Benchmarks could change with different CPU types
      - name: Get GitHub Runner System Information
        uses: kenchan0130/actions-system-info@59699597e84e80085a750998045983daa49274c4 # v1.4.0
        id: system-info

      - name: Get Default branch SHA
        id: base-sha
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          SHA="$(git ls-remote origin "${DEFAULT_BRANCH}" | awk 'NR==1 {print $1}')"
          if [[ -z "${SHA}" ]]; then
            echo "Failed to resolve SHA for default branch '${DEFAULT_BRANCH}'" >&2
            exit 1
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Cache Key
        id: cache-key
        shell: bash
        env:
          CPU_MODEL: ${{ steps.system-info.outputs.cpu-model }}
          BASE_SHA: ${{ steps.base-sha.outputs.sha }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          SAFE_CPU_MODEL="$(printf '%s' "$CPU_MODEL" | tr -cs '[:alnum:]._-' '-')"
          SAFE_CPU_MODEL="${SAFE_CPU_MODEL#-}"
          SAFE_CPU_MODEL="${SAFE_CPU_MODEL%-}"
          WD_SLUG="$(printf '%s' "$WORKING_DIRECTORY" | tr -cs '[:alnum:]._-' '-')"
          # The SHA sits at the end so restore-keys can fall back to the newest
          # cache of the same OS/CPU/module when the exact SHA has no cache yet.
          echo "prefix=benchmark-${{ runner.os }}-${SAFE_CPU_MODEL}-${WD_SLUG}-" >> "$GITHUB_OUTPUT"
          echo "key=benchmark-${{ runner.os }}-${SAFE_CPU_MODEL}-${WD_SLUG}-${BASE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Get Benchmark Results from Default branch
        id: cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./cache
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: ${{ steps.cache-key.outputs.prefix }}

      # This will only run if we have Benchmark Results from the default branch
      - name: Compare PR Benchmark Results with Default branch
        if: github.event_name == 'pull_request' && steps.cache.outputs.cache-matched-key != ''
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: go
          output-file-path: output.txt
          external-data-json-path: ./cache/benchmark-data.json
          # Do not save the data (This allows comparing benchmarks)
          save-data-file: false
          fail-on-alert: true
          # Comment on the PR if the branch is not a fork
          comment-on-alert: ${{ github.event.pull_request.head.repo.fork == false }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          alert-threshold: ${{ inputs.alert-threshold }}
          go-force-package-suffix: ${{ inputs.go-force-package-suffix }}

      - name: Store Benchmark Results for Default branch
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: go
          output-file-path: output.txt
          external-data-json-path: ./cache/benchmark-data.json
          # Save the data to external file (cache)
          save-data-file: true
          # The compare step only reads the newest entry; without this cap the
          # cache would grow on every push because restore-keys seed it with the
          # previous cache content.
          max-items-in-chart: 1
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          alert-threshold: ${{ inputs.alert-threshold }}
          go-force-package-suffix: ${{ inputs.go-force-package-suffix }}

      - name: Publish Benchmark Results to GitHub Pages
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: go
          output-file-path: output.txt
          benchmark-data-dir-path: ${{ inputs.benchmark-data-dir-path }}
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Regressions that reach the default branch still leave a visible trace
          comment-on-alert: true
          summary-always: true
          # Save the data to external file (GitHub Pages)
          save-data-file: true
          max-items-in-chart: ${{ inputs.max-items-in-chart }}
          alert-threshold: ${{ inputs.alert-threshold }}
          go-force-package-suffix: ${{ inputs.go-force-package-suffix }}
          auto-push: true

      - name: Update Benchmark Results cache
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./cache
          key: ${{ steps.cache-key.outputs.key }}

      - name: Sync Benchmark Page
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch && inputs.sync-pages
        uses: gofiber/.github/.github/actions/benchmark-pages@main
        with:
          data-dir: ${{ inputs.benchmark-data-dir-path }}
