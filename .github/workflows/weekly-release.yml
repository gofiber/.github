name: weekly-release

# Reusable, centrally hosted orchestrator for GoFiber's weekly auto-release
# process. Callers live in each target repo (cli, utils, template, storage,
# contrib) and differ only in the cron line + repo-type input.
#
# Auth: uses the caller's automatic `GITHUB_TOKEN`. No external App or PAT is
# required â€” the caller just needs the right `permissions:` block.
#
# Flow (single-module repos â€” multi-module waves added in a later iteration):
#   1. Locate draft releases. The legacy release-drafter workflow in each repo
#      keeps fresh drafts on every push to main; this workflow consumes them.
#   2. Optionally filter by `draft-tags` (supports full tags like "v2.0.3" AND
#      package names like "websocket" â€” matched as substrings in the tag).
#   3. Detect major bumps (tag comparison + Breaking Changes section scan).
#   4. If major + skip-major: upsert a tracking issue, exit 0.
#   5. Otherwise: clean release body + publish in one atomic PATCH.

on:
  workflow_call:
    inputs:
      repo-type:
        description: 'single | multi â€” only `single` is implemented in this iteration.'
        required: true
        type: string
      draft-tags:
        description: >-
          Comma-separated filter for draft releases. Supports full tags
          (e.g. "v2.0.3") AND package names (e.g. "websocket", "redis").
          Matched as substrings against each draft's tag_name â€” so
          "websocket" matches "v3/websocket/v1.2.0" and "redis" matches
          "redis/v3.4.3". Leave empty to process ALL pending drafts.
        required: false
        type: string
        default: ''
      release-plan-path:
        description: >-
          Path to the per-repo release plan manifest. Only read when
          repo-type=multi. Single-module callers do not need a manifest.
        required: false
        type: string
        default: .github/release-plan.yml
      config-repository:
        description: Repository hosting this reusable workflow and the composite action.
        required: false
        type: string
        default: gofiber/.github
      config-ref:
        description: Informational git ref of the central repo (cannot be used in `uses:`).
        required: false
        type: string
        default: main
      dry-run:
        description: When true, compute the cleaned body but do not PATCH the release.
        required: false
        type: boolean
        default: false
      skip-major:
        description: When true, major-version bumps are left as drafts and a tracking issue is upserted.
        required: false
        type: boolean
        default: true
      bot-logins:
        description: >-
          Extra bot logins to strip from the contributor footer, comma-separated.
          Merged with the cleanup tool's built-in defaults.
        required: false
        type: string
        default: ''
      dedupe:
        description: Drop duplicate PR references across sections.
        required: false
        type: boolean
        default: true
      publish-delay-minutes:
        description: Delay between module publishes in a multi-module wave (unused for `single`).
        required: false
        type: number
        default: 10

permissions:
  contents: write
  pull-requests: read
  issues: write

# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
jobs:

  single-release:
    if: inputs.repo-type == 'single'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Locate draft release(s)
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DRAFT_TAGS: ${{ inputs.draft-tags }}
        shell: bash
        run: |
          set -euo pipefail

          # Fetch all releases and extract drafts, newest first.
          releases=$(gh api "/repos/${GH_REPO}/releases" --paginate)
          drafts=$(printf '%s' "$releases" | jq '[.[] | select(.draft == true)] | sort_by(.created_at) | reverse')
          count=$(printf '%s' "$drafts" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "no-draft=true" >> "$GITHUB_OUTPUT"
            echo "â„ąď¸Ź No draft release found â€” nothing to publish this week." >> "$GITHUB_STEP_SUMMARY"
            echo "no draft release found"
            exit 0
          fi

          # Always list all available drafts in the summary.
          {
            echo "## Available draft releases"
            echo ""
            echo "| Tag | Name | Created |"
            echo "|-----|------|---------|"
            printf '%s' "$drafts" | jq -r '.[] | "| `\(.tag_name)` | \(.name // "â€”") | \(.created_at[:10]) |"'
            echo ""
            if [ -z "${DRAFT_TAGS}" ]; then
              echo "> Processing **all** drafts (no filter set)."
            else
              echo "> Filter active: \`${DRAFT_TAGS}\` (substring match on tag name)."
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # If a filter was provided, match as substrings against tag_name.
          # This supports both full tags ("v2.0.3") and package names
          # ("websocket" matches "v3/websocket/v1.2.0").
          if [ -n "${DRAFT_TAGS}" ]; then
            filters=$(printf '%s' "$DRAFT_TAGS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            drafts=$(printf '%s' "$drafts" | jq --argjson f "$filters" \
              '[.[] | select(.tag_name as $t | $f | any(. as $p | $t | contains($p)))]')
            count=$(printf '%s' "$drafts" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "no-draft=true" >> "$GITHUB_OUTPUT"
              echo "â„ąď¸Ź No draft matched filter: ${DRAFT_TAGS}" >> "$GITHUB_STEP_SUMMARY"
              echo "no matching draft for: ${DRAFT_TAGS}"
              exit 0
            fi
            echo "Filtered to $count draft(s) matching: ${DRAFT_TAGS}"
          fi

          if [ "$count" -gt 1 ]; then
            echo "::warning::Found $count draft releases; using the newest. Investigate the others."
          fi

          # For single-module: pick the first (newest) draft.
          printf '%s' "$drafts" | jq '.[0]' > "$RUNNER_TEMP/draft.json"
          jq -r '.body // ""' "$RUNNER_TEMP/draft.json" > "$RUNNER_TEMP/draft_body.md"

          # Skip drafts that contain no actual PR/issue references.
          # release-drafter sometimes creates placeholder drafts before any
          # PRs are merged â€” publishing those is pointless. We look for
          # "#123" references or /pull/ and /issues/ links.
          if ! grep -qE '#[0-9]+|/pull/[0-9]+|/issues?/[0-9]+' "$RUNNER_TEMP/draft_body.md"; then
            tag=$(jq -r '.tag_name' "$RUNNER_TEMP/draft.json")
            echo "no-draft=true" >> "$GITHUB_OUTPUT"
            echo "â„ąď¸Ź Draft \`${tag}\` has no PR entries â€” skipped." >> "$GITHUB_STEP_SUMMARY"
            echo "draft ${tag} has no PR entries, skipping"
            exit 0
          fi

          {
            echo "no-draft=false"
            echo "id=$(jq -r '.id' "$RUNNER_TEMP/draft.json")"
            echo "tag_name=$(jq -r '.tag_name' "$RUNNER_TEMP/draft.json")"
            echo "name=$(jq -r '.name // ""' "$RUNNER_TEMP/draft.json")"
          } >> "$GITHUB_OUTPUT"

      - name: Determine previous tag and bump kind
        id: bump
        if: steps.draft.outputs.no-draft == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          prev=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "prev_tag=${prev}" >> "$GITHUB_OUTPUT"

          is_major=false
          reason=""
          if [ -n "$prev" ]; then
            prev_major=$(printf '%s' "$prev"    | sed -E 's/^v?([0-9]+).*/\1/')
            next_major=$(printf '%s' "$NEXT_TAG" | sed -E 's/^v?([0-9]+).*/\1/')
            if [ "$next_major" -gt "$prev_major" ] 2>/dev/null; then
              is_major=true
              reason="major segment bumped: ${prev} â†’ ${NEXT_TAG}"
            fi
          fi

          if [ "$is_major" = "false" ]; then
            awk '
              /^## .*[Bb]reaking/ { in_section = 1; next }
              /^## /              { in_section = 0 }
              in_section && /^- / { print; exit }
            ' "$RUNNER_TEMP/draft_body.md" > "$RUNNER_TEMP/breaking.txt"
            if [ -s "$RUNNER_TEMP/breaking.txt" ]; then
              is_major=true
              reason="draft contains a non-empty Breaking Changes section"
            fi
          fi

          echo "is_major=${is_major}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}"    >> "$GITHUB_OUTPUT"
          echo "prev: ${prev:-<none>} | next: ${NEXT_TAG} | is_major=${is_major} (${reason:-no breaking signal})" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Major gate â€” upsert tracking issue and skip
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major == 'true' &&
          inputs.skip-major
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
          PREV_TAG: ${{ steps.bump.outputs.prev_tag }}
          REASON:   ${{ steps.bump.outputs.reason }}
        shell: bash
        run: |
          set -euo pipefail
          title="Major release pending: ${NEXT_TAG}"
          draft_url="${GITHUB_SERVER_URL}/${GH_REPO}/releases/tag/${NEXT_TAG}"
          run_url="${GITHUB_SERVER_URL}/${GH_REPO}/actions/runs/${GITHUB_RUN_ID}"
          existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
          body=$(cat <<EOF
          release-drafter has prepared \`${NEXT_TAG}\` (previous: \`${PREV_TAG:-<none>}\`).
          The weekly auto-release job skipped it because **${REASON}** and \`skip-major\` is on.

          Please review, edit the draft as needed, and publish manually.

          - Draft: ${draft_url}
          - Workflow run: ${run_url}
          EOF
          )
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Weekly run $(date -u +%FT%TZ) still sees the pending major release. ${run_url}"
          else
            gh issue create --title "$title" --body "$body" --label "release-automation"
          fi
          {
            echo "đźš§ Major bump **skipped** â€” maintainer review required."
            echo ""
            echo "- Reason: ${REASON}"
            echo "- Draft: ${draft_url}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for open pending-major tracking issue
        id: pending
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          title="Major release pending: ${NEXT_TAG}"
          existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "pending=true"  >> "$GITHUB_OUTPUT"
            echo "issue=$existing" >> "$GITHUB_OUTPUT"
            echo "âŹ¸ď¸Ź Skipping â€” tracking issue #${existing} is still open for ${NEXT_TAG}." \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean and publish release
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true' &&
          steps.pending.outputs.pending != 'true'
        uses: gofiber/.github/.github/actions/clean-release-notes@main
        with:
          release-id: ${{ steps.draft.outputs.id }}
          bots: ${{ inputs.bot-logins }}
          dedupe: ${{ inputs.dedupe }}
          dry-run: ${{ inputs.dry-run }}
          publish: ${{ inputs.dry-run && 'false' || 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always() && steps.draft.outputs.no-draft == 'false'
        env:
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
          DRY_RUN:  ${{ inputs.dry-run }}
          PENDING:  ${{ steps.pending.outputs.pending }}
          IS_MAJOR: ${{ steps.bump.outputs.is_major }}
        shell: bash
        run: |
          set -eu
          case "${IS_MAJOR}/${PENDING}/${DRY_RUN}" in
            true/*/*)          echo "outcome: major-skip (${NEXT_TAG})" ;;
            */true/*)          echo "outcome: pending-major-open â€” skipped (${NEXT_TAG})" ;;
            */*/true)          echo "outcome: dry-run (${NEXT_TAG}) â€” no API write" ;;
            *)                 echo "outcome: published (${NEXT_TAG})" ;;
          esac

  # â”€â”€ Placeholder: multi-module wave orchestration â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  multi-release:
    if: inputs.repo-type == 'multi'
    runs-on: ubuntu-latest
    steps:
      - name: Not yet implemented
        shell: bash
        run: |
          echo "::error::repo-type=multi is not yet implemented in weekly-release.yml."
          exit 1
