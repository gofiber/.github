name: weekly-release

# Reusable, centrally hosted orchestrator for GoFiber's weekly auto-release.
#
# Auth: uses the caller's automatic GITHUB_TOKEN. Callers must grant
# permissions: contents:write, pull-requests:read, issues:write.
#
# Single-module (cli, utils, schema, multi-labeler):
#   Locates the newest draft, major-gate, publish. Release notes are
#   already cleaned in place by the per-repo post-drafter cleanup
#   workflow, so publishing only flips draft:false.
#
# Multi-module (contrib, storage, template):
#   Reads a `release-plan.yml` manifest from the caller repo that defines
#   ordered "waves" of modules. Waves run sequentially (wave 2 waits for
#   wave 1). Modules within a wave run sequentially with a configurable
#   delay between publishes. Each module is matched to its draft release
#   via `tag-prefix`. Dependencies (e.g. socketio->websocket in contrib,
#   engines->core in template) are solved by putting the dependency in an
#   earlier wave.
#
# Notable behavior changes:
#   - Low-priority cooldown: drafts whose only entries are Maintenance
#     and/or Documentation are held until N weeks (default 3) have
#     elapsed since the previous release of the same package. Dependabot
#     github_actions bumps are filtered out so a draft made of only
#     those never publishes. See inputs low-priority-cooldown-weeks and
#     low-priority-sections.
#   - config-ref default is '' (empty). Empty resolves to 'main', so
#     the script helpers in .central/.github/scripts/ track the latest
#     central main. Pass an explicit config-ref (branch, tag, or SHA)
#     to pin to a specific revision of the central repo.

on:
  workflow_call:
    inputs:
      repo-type:
        description: 'single | multi'
        required: true
        type: string
      draft-tags:
        description: >-
          Comma-separated filter for draft releases. Supports full tags
          (e.g. "v2.0.3") AND package names (e.g. "websocket", "redis").
          Matched as substrings against each draft's tag_name. Empty = all.
        required: false
        type: string
        default: ''
      release-plan-path:
        description: >-
          Path to the per-repo release plan manifest (waves + modules).
          Only read when repo-type=multi.
        required: false
        type: string
        default: .github/release-plan.yml
      config-repository:
        description: Repository hosting this reusable workflow and the composite action.
        required: false
        type: string
        default: gofiber/.github
      config-ref:
        description: >-
          Git ref of the central repo to check out for release-gate.sh.
          Empty (default) resolves to 'main'. Pass an explicit branch,
          tag, or SHA to pin.
        required: false
        type: string
        default: ''
      dry-run:
        description: When true, do not publish; only report what would be released.
        required: false
        type: boolean
        default: false
      skip-major:
        description: When true, major-version bumps are left as drafts with a tracking issue.
        required: false
        type: boolean
        default: true
      publish-delay-minutes:
        description: Delay (minutes) between module publishes in a multi-module wave.
        required: false
        type: string
        default: '2'
      wave-delay-minutes:
        description: Delay (minutes) between sequential waves.
        required: false
        type: string
        default: '0'
      low-priority-cooldown-weeks:
        description: >-
          Minimum weeks since the previous release of the same package
          before a draft that only contains low-priority entries (see
          low-priority-sections) will be published. Drafts with any
          other entry (features, fixes, updates, breaking, ...) are
          released regardless. Single-module repos use the repo's latest
          release as the reference tag; multi-module repos use the
          latest tag sharing the same prefix (e.g. "websocket/v...").
        required: false
        type: string
        default: '3'
      low-priority-sections:
        description: >-
          Comma-separated keywords matched case-insensitively as a
          substring against draft section headings to mark them as
          low-priority. Emoji-prefixed headings such as "## 🧹
          Maintenance" are recognized. A draft whose only entries are
          in these sections is gated on low-priority-cooldown-weeks.
          All other section headings count as high-priority by default,
          so callers do not need to list them. Independently of this
          list, bullets in low-priority sections that reference a
          Dependabot github_actions PR (CI workflow dependency bumps)
          are filtered out entirely, so a draft made of only those
          never releases.
        required: false
        type: string
        default: 'Maintenance,Documentation'
      post-release-events:
        description: >-
          Comma-separated repository_dispatch event types to fire after a
          successful single-module publish (e.g. "after-release,sync-docs").
          Requires the dispatch-token secret. Ignored for multi-module repos
          (use release-plan.yml post-release hooks instead).
        required: false
        type: string
        default: ''
    secrets:
      dispatch-token:
        description: >-
          PAT or GitHub App token with contents:write for cross-repo
          repository_dispatch. Falls back to GITHUB_TOKEN (same-repo only).
        required: false

permissions:
  contents: write
  pull-requests: read
  issues: write

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Single-module release ─────────────────────────────────────────────────
  single-release:
    if: inputs.repo-type == 'single'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout central scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.config-repository }}
          ref: ${{ inputs.config-ref || 'main' }}
          path: .central
          sparse-checkout: |
            .github/scripts

      - name: Locate draft release(s)
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DRAFT_TAGS: ${{ inputs.draft-tags }}
          COOLDOWN_WEEKS: ${{ inputs.low-priority-cooldown-weeks }}
          LOW_PRIORITY_SECTIONS: ${{ inputs.low-priority-sections }}
        shell: bash
        run: |
          set -euo pipefail
          # Sanitize COOLDOWN_WEEKS: accept non-negative integers; treat
          # empty (e.g. caller passed through an unset dispatch input)
          # as "use default" without warning.
          if [ -z "${COOLDOWN_WEEKS:-}" ]; then
            COOLDOWN_WEEKS=3
          elif ! [[ "$COOLDOWN_WEEKS" =~ ^[0-9]+$ ]]; then
            echo "::warning::low-priority-cooldown-weeks is not a non-negative integer ('${COOLDOWN_WEEKS}'); falling back to 3."
            COOLDOWN_WEEKS=3
          fi
          releases=$(gh api "/repos/${GH_REPO}/releases" --paginate)
          drafts=$(printf '%s' "$releases" | jq '[.[] | select(.draft == true)] | sort_by(.created_at) | reverse')
          count=$(printf '%s' "$drafts" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "no-draft=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No draft release found; nothing to publish this week." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## Available draft releases"
            echo ""
            echo "| Tag | Name | Created |"
            echo "|-----|------|---------|"
            printf '%s' "$drafts" | jq -r '.[] | "| `\(.tag_name)` | \(.name // "-") | \(.created_at[:10]) |"'
            echo ""
            if [ -z "${DRAFT_TAGS}" ]; then
              echo "> Processing **all** drafts (no filter set)."
            else
              echo "> Filter active: \`${DRAFT_TAGS}\` (substring match)."
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${DRAFT_TAGS}" ]; then
            filters=$(printf '%s' "$DRAFT_TAGS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            drafts=$(printf '%s' "$drafts" | jq --argjson f "$filters" \
              '[.[] | select(.tag_name as $t | $f | any(. as $p | $t | contains($p)))]')
            count=$(printf '%s' "$drafts" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "no-draft=true" >> "$GITHUB_OUTPUT"
              echo "ℹ️ No draft matched filter: ${DRAFT_TAGS}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          fi

          if [ "$count" -gt 1 ]; then
            echo "::warning::Found $count draft releases; using the newest."
          fi

          printf '%s' "$drafts" | jq '.[0]' > "$RUNNER_TEMP/draft.json"
          jq -r '.body // ""' "$RUNNER_TEMP/draft.json" > "$RUNNER_TEMP/draft_body.md"

          tag=$(jq -r '.tag_name' "$RUNNER_TEMP/draft.json")

          # Source shared classifier / cooldown helpers. Single source
          # of truth: /.github/scripts/release-gate.sh in the central
          # repo (checked out at $GITHUB_WORKSPACE/.central). Tests for
          # these functions live alongside the script.
          GATE="$GITHUB_WORKSPACE/.central/.github/scripts/release-gate.sh"
          if [ ! -f "$GATE" ]; then
            echo "::error::release-gate.sh missing at ${GATE}. Central checkout (ref '${{ inputs.config-ref || 'main' }}') did not produce the scripts directory."
            exit 1
          fi
          # shellcheck disable=SC1091
          source "$GATE"

          classification=$(classify_draft_priority < "$RUNNER_TEMP/draft_body.md")

          if [ "$classification" = "empty" ]; then
            echo "no-draft=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Draft \`${tag}\` has no actionable entries; skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$classification" = "low-only" ]; then
            prev_tag=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')

            # Major-bump pre-check via release-gate.sh: bypass cooldown
            # for majors so the next "Determine previous tag and bump
            # kind" step can route them to the major-gate.
            is_major_pre=$(detect_major_bump "$prev_tag" "$tag" "$RUNNER_TEMP/draft_body.md" | cut -f1)

            if [ "$is_major_pre" = "true" ]; then
              echo "ℹ️ Draft \`${tag}\` is low-priority only but appears to be a major bump; bypassing cooldown so the major-gate can handle it." >> "$GITHUB_STEP_SUMMARY"
            else
              weeks=$(weeks_since_release "$prev_tag")
              if [ "$weeks" -lt "$COOLDOWN_WEEKS" ]; then
                remaining=$(( COOLDOWN_WEEKS - weeks ))
                echo "no-draft=true" >> "$GITHUB_OUTPUT"
                echo "⏸️ Draft \`${tag}\` is low-priority only; within ${COOLDOWN_WEEKS}-week cooldown since \`${prev_tag:-<none>}\` (${weeks}w elapsed, ${remaining}w remaining). Skipped." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              echo "ℹ️ Draft \`${tag}\` is low-priority only but cooldown elapsed (${weeks}w >= ${COOLDOWN_WEEKS}w). Releasing." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          {
            echo "no-draft=false"
            echo "id=$(jq -r '.id' "$RUNNER_TEMP/draft.json")"
            echo "tag_name=$(jq -r '.tag_name' "$RUNNER_TEMP/draft.json")"
            echo "name=$(jq -r '.name // ""' "$RUNNER_TEMP/draft.json")"
          } >> "$GITHUB_OUTPUT"

      - name: Determine previous tag and bump kind
        id: bump
        if: steps.draft.outputs.no-draft == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          GATE="$GITHUB_WORKSPACE/.central/.github/scripts/release-gate.sh"
          if [ ! -f "$GATE" ]; then
            echo "::error::release-gate.sh missing at ${GATE}. Central checkout (ref '${{ inputs.config-ref || 'main' }}') did not produce the scripts directory."
            exit 1
          fi
          # shellcheck disable=SC1091
          source "$GATE"

          prev=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "prev_tag=${prev}" >> "$GITHUB_OUTPUT"

          dmb_result=$(detect_major_bump "$prev" "$NEXT_TAG" "$RUNNER_TEMP/draft_body.md")
          is_major=$(printf '%s' "$dmb_result" | cut -f1)
          reason=$(printf '%s' "$dmb_result" | cut -f2-)

          echo "is_major=${is_major}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}"    >> "$GITHUB_OUTPUT"
          echo "prev: ${prev:-<none>} | next: ${NEXT_TAG} | is_major=${is_major} (${reason:-no breaking signal})" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Major gate - upsert tracking issue and skip
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major == 'true' &&
          inputs.skip-major
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
          PREV_TAG: ${{ steps.bump.outputs.prev_tag }}
          REASON:   ${{ steps.bump.outputs.reason }}
        shell: bash
        run: |
          set -euo pipefail
          title="Major release pending: ${NEXT_TAG}"
          draft_url="${GITHUB_SERVER_URL}/${GH_REPO}/releases/tag/${NEXT_TAG}"
          run_url="${GITHUB_SERVER_URL}/${GH_REPO}/actions/runs/${GITHUB_RUN_ID}"
          existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
          body="release-drafter has prepared \`${NEXT_TAG}\` (previous: \`${PREV_TAG:-<none>}\`).
          The weekly auto-release job skipped it because **${REASON}** and \`skip-major\` is on.

          Please review, edit the draft as needed, and publish manually.

          - Draft: ${draft_url}
          - Workflow run: ${run_url}"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Weekly run $(date -u +%FT%TZ) still sees the pending major release. ${run_url}"
          else
            gh issue create --title "$title" --body "$body" --label "release-automation"
          fi
          echo "🚧 Major bump **skipped**: ${REASON}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check for open pending-major tracking issue
        id: pending
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          title="Major release pending: ${NEXT_TAG}"
          existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "⏸️ Skipping; tracking issue #${existing} is still open for ${NEXT_TAG}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true' &&
          steps.pending.outputs.pending != 'true' &&
          !inputs.dry-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_ID: ${{ steps.draft.outputs.id }}
          TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          # Release notes are already cleaned in place by the per-repo
          # post-drafter cleanup workflow, so publishing only flips
          # draft:false. tag_name is re-echoed so GitHub does not regenerate
          # an "untagged-<sha>" tag on the PATCH.
          jq -n --arg tag "$TAG" '{draft: false, tag_name: $tag}' \
            | gh api --method PATCH "/repos/${GH_REPO}/releases/${RELEASE_ID}" --input - > /dev/null
          echo "📦 Published \`${TAG}\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch post-release events
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true' &&
          steps.pending.outputs.pending != 'true' &&
          !inputs.dry-run &&
          inputs.post-release-events != ''
        env:
          DISPATCH_TOKEN: ${{ secrets.dispatch-token || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENTS: ${{ inputs.post-release-events }}
          TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -ra events <<< "$EVENTS"
          for event in "${events[@]}"; do
            event=$(printf '%s' "$event" | xargs)
            [ -z "$event" ] && continue
            body=$(jq -n --arg event "$event" --arg tag "$TAG" --arg source "$GH_REPO" \
              '{event_type: $event, client_payload: {tag: $tag, source_repository: $source}}')
            echo "Dispatching '$event' → '$GH_REPO'..."
            if printf '%s' "$body" | GH_TOKEN="$DISPATCH_TOKEN" gh api --method POST \
              "/repos/${GH_REPO}/dispatches" --input - 2>&1; then
              echo "🔔 Dispatched '$event' → '$GH_REPO'"
              echo "🔔 Dispatched \`$event\` → \`$GH_REPO\`" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️ Failed to dispatch '$event' → '$GH_REPO'"
              echo "⚠️ Failed to dispatch \`$event\` → \`$GH_REPO\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Summary
        if: always() && steps.draft.outputs.no-draft == 'false'
        env:
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
          DRY_RUN:  ${{ inputs.dry-run }}
          PENDING:  ${{ steps.pending.outputs.pending }}
          IS_MAJOR: ${{ steps.bump.outputs.is_major }}
        shell: bash
        run: |
          set -eu
          case "${IS_MAJOR}/${PENDING}/${DRY_RUN}" in
            true/*/*)   echo "outcome: major-skip (${NEXT_TAG})" ;;
            */true/*)   echo "outcome: pending-major-open, skipped (${NEXT_TAG})" ;;
            */*/true)   echo "outcome: dry-run (${NEXT_TAG}), no API write" ;;
            *)          echo "outcome: published (${NEXT_TAG})" ;;
          esac

  # ── Multi-module wave release ─────────────────────────────────────────────
  #
  # Reads release-plan.yml for explicit dependency waves, then auto-discovers
  # any remaining drafts that weren't listed and releases them in a final
  # "auto" wave. This means new packages are picked up automatically; the
  # manifest only needs entries for modules with ordering constraints.
  multi-release:
    if: inputs.repo-type == 'multi'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout caller repo (for release-plan.yml)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: ${{ inputs.release-plan-path }}

      - name: Checkout central repo (release-gate.sh)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.config-repository }}
          ref: ${{ inputs.config-ref || 'main' }}
          path: .central

      - name: Process waves + auto-discover remaining
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TOKEN: ${{ secrets.dispatch-token || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DRAFT_TAGS: ${{ inputs.draft-tags }}
          DRY_RUN: ${{ inputs.dry-run }}
          SKIP_MAJOR: ${{ inputs.skip-major }}
          DELAY_MINUTES: ${{ inputs.publish-delay-minutes }}
          WAVE_DELAY_MINUTES: ${{ inputs.wave-delay-minutes }}
          COOLDOWN_WEEKS: ${{ inputs.low-priority-cooldown-weeks }}
          LOW_PRIORITY_SECTIONS: ${{ inputs.low-priority-sections }}
          PLAN_PATH: ${{ inputs.release-plan-path }}
        shell: bash
        run: |
          set -euo pipefail

          # Sanitize COOLDOWN_WEEKS: accept non-negative integers; treat
          # empty (e.g. caller passed through an unset dispatch input)
          # as "use default" without warning.
          if [ -z "${COOLDOWN_WEEKS:-}" ]; then
            COOLDOWN_WEEKS=3
          elif ! [[ "$COOLDOWN_WEEKS" =~ ^[0-9]+$ ]]; then
            echo "::warning::low-priority-cooldown-weeks is not a non-negative integer ('${COOLDOWN_WEEKS}'); falling back to 3."
            COOLDOWN_WEEKS=3
          fi

          # ── Read manifest ──────────────────────────────────────────
          if [ ! -f "$PLAN_PATH" ]; then
            echo "::error::Release plan not found: $PLAN_PATH"
            exit 1
          fi

          if ! command -v yq &>/dev/null; then
            wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            chmod +x /usr/local/bin/yq
          fi

          wave_count=$(yq '.waves | length // 0' "$PLAN_PATH")

          # ── Read delays from manifest (override workflow inputs) ──
          plan_wave_delay=$(yq '.wave-delay-minutes // ""' "$PLAN_PATH")
          plan_publish_delay=$(yq '.publish-delay-minutes // ""' "$PLAN_PATH")
          [ -n "$plan_wave_delay" ] && WAVE_DELAY_MINUTES="$plan_wave_delay"
          [ -n "$plan_publish_delay" ] && DELAY_MINUTES="$plan_publish_delay"

          # ── Fetch all releases once ────────────────────────────────
          releases=$(gh api "/repos/${GH_REPO}/releases" --paginate)
          all_drafts=$(printf '%s' "$releases" | jq '[.[] | select(.draft == true)]')

          {
            echo "## Available draft releases"
            echo ""
            echo "| Tag | Name | Created |"
            echo "|-----|------|---------|"
            printf '%s' "$all_drafts" | jq -r '.[] | "| `\(.tag_name)` | \(.name // "-") | \(.created_at[:10]) |"'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Apply user filter if set
          if [ -n "$DRAFT_TAGS" ]; then
            filters=$(printf '%s' "$DRAFT_TAGS" | jq -R \
              'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            all_drafts=$(printf '%s' "$all_drafts" | jq --argjson f "$filters" \
              '[.[] | select(.tag_name as $t | $f | any(. as $p | $t | contains($p)))]')
            echo "> Filter: \`$DRAFT_TAGS\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          # ── Execution plan ──────────────────────────────────────────
          draft_count=$(printf '%s' "$all_drafts" | jq 'length')
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  Weekly Release: Execution Plan                  ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  Drafts found: $draft_count"
          echo "║  Waves:        $wave_count"
          echo "║  Module delay: ${DELAY_MINUTES}m"
          echo "║  Wave delay:   ${WAVE_DELAY_MINUTES:-0}m"
          echo "║  Dry-run:      $DRY_RUN"
          echo "╚══════════════════════════════════════════════════╝"
          printf '%s' "$all_drafts" | jq -r '.[] | "  → \(.tag_name)"'
          echo ""

          # ── Track processed draft tags ─────────────────────────────
          > "$RUNNER_TEMP/processed_tags.txt"

          # ── Helpers ────────────────────────────────────────────────
          find_draft() {
            local prefix="$1"
            if [ -z "$prefix" ] || [ "$prefix" = "null" ]; then
              printf '%s' "$all_drafts" | jq \
                '[.[] | select(.tag_name | test("^v[0-9]"))] | sort_by(.created_at) | reverse | .[0] // empty'
            else
              printf '%s' "$all_drafts" | jq --arg p "$prefix" \
                '[.[] | select(.tag_name | startswith($p))] | sort_by(.created_at) | reverse | .[0] // empty'
            fi
          }

          find_prev() {
            local prefix="$1"
            if [ -z "$prefix" ] || [ "$prefix" = "null" ]; then
              printf '%s' "$releases" | jq -r \
                '[.[] | select(.draft == false and .prerelease == false and (.tag_name | test("^v[0-9]")))] | sort_by(.created_at) | reverse | .[0].tag_name // ""'
            else
              printf '%s' "$releases" | jq -r --arg p "$prefix" \
                '[.[] | select(.draft == false and .prerelease == false and (.tag_name | startswith($p)))] | sort_by(.created_at) | reverse | .[0].tag_name // ""'
            fi
          }

          find_prev_for_tag() {
            local tag="$1"
            # Extract the prefix (everything before the last /vN.N.N segment)
            local prefix=$(printf '%s' "$tag" | sed -E 's|(.*/)v[0-9].*|\1|')
            if [ "$prefix" = "$tag" ]; then prefix=""; fi
            find_prev "$prefix"
          }

          # Source shared classifier / cooldown helpers. Single source
          # of truth: /.github/scripts/release-gate.sh in the central
          # repo (checked out at $GITHUB_WORKSPACE/.central). Tests for
          # these functions live alongside the script.
          GATE="$GITHUB_WORKSPACE/.central/.github/scripts/release-gate.sh"
          if [ ! -f "$GATE" ]; then
            echo "::error::release-gate.sh missing at ${GATE}. Central checkout (ref '${{ inputs.config-ref || 'main' }}') did not produce the scripts directory."
            exit 1
          fi
          # shellcheck disable=SC1091
          source "$GATE"

          # ── run_hooks: execute post-release hooks for a module ────
          run_hooks() {
            local name="$1"
            local tag="$2"
            local hooks="$3"

            if [ -z "$hooks" ] || [ "$hooks" = "null" ] || [ "$hooks" = "[]" ]; then
              return
            fi

            local hook_count
            hook_count=$(printf '%s' "$hooks" | jq 'length')
            echo "  Processing $hook_count hook(s) for $name..."

            for hi in $(seq 0 $((hook_count - 1))); do
              local action
              action=$(printf '%s' "$hooks" | jq -r ".[$hi].action")

              case "$action" in
                dispatch)
                  local repo event directory ecosystem
                  repo=$(printf '%s' "$hooks" | jq -r ".[$hi].repo // \"${GH_REPO}\"")
                  event=$(printf '%s' "$hooks" | jq -r ".[$hi].event")
                  directory=$(printf '%s' "$hooks" | jq -r ".[$hi].directory // \"/\"")
                  ecosystem=$(printf '%s' "$hooks" | jq -r ".[$hi][\"package-ecosystem\"] // \"gomod\"")

                  local body
                  body=$(jq -n \
                    --arg event "$event" \
                    --arg module "$name" \
                    --arg tag "$tag" \
                    --arg source "$GH_REPO" \
                    --arg dir "$directory" \
                    --arg eco "$ecosystem" \
                    '{event_type: $event, client_payload: {module: $module, tag: $tag, source_repository: $source, directory: $dir, package_ecosystem: $eco}}')

                  if [ "$DRY_RUN" = "true" ]; then
                    echo "  🔔 (dry-run) Would dispatch '$event' → '$repo'"
                    echo "  - 🔔 (dry-run) Would dispatch \`$event\` → \`$repo\`" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "  Dispatching '$event' → '$repo'..."
                    local api_err=""
                    if api_err=$(printf '%s' "$body" | GH_TOKEN="$DISPATCH_TOKEN" gh api --method POST \
                      "/repos/${repo}/dispatches" --input - 2>&1); then
                      echo "  🔔 Dispatched '$event' → '$repo'"
                      echo "  - 🔔 Dispatched \`$event\` → \`$repo\`" >> "$GITHUB_STEP_SUMMARY"
                    else
                      echo "  ⚠️ Failed to dispatch '$event' → '$repo': $api_err"
                      echo "  - ⚠️ Failed to dispatch \`$event\` → \`$repo\`: $api_err" >> "$GITHUB_STEP_SUMMARY"
                    fi
                  fi
                  ;;
                *)
                  echo "  ⚠️ Unknown hook action: '$action'"
                  echo "  - ⚠️ Unknown hook action: \`$action\`" >> "$GITHUB_STEP_SUMMARY"
                  ;;
              esac
            done
          }

          # ── process_module: shared logic for one draft release ─────
          published=0
          skipped=0
          failed=0
          is_first_module=true

          process_module() {
            local name="$1"
            local draft="$2"
            local module_hooks="${3:-[]}"

            local draft_id draft_tag draft_body
            draft_id=$(printf '%s' "$draft" | jq -r '.id')
            draft_tag=$(printf '%s' "$draft" | jq -r '.tag_name')
            draft_body=$(printf '%s' "$draft" | jq -r '.body // ""')

            echo "::group::📦 $name ($draft_tag)"
            echo "── Start: $name | Tag: $draft_tag ──"

            # Record as processed
            echo "$draft_tag" >> "$RUNNER_TEMP/processed_tags.txt"

            # Delay (skip before the very first module)
            if [ "$is_first_module" = "true" ]; then
              is_first_module=false
            elif [ "$DRY_RUN" != "true" ] && [ "$DELAY_MINUTES" -gt 0 ]; then
              echo "⏳ Waiting ${DELAY_MINUTES}m before \`$name\`..."
              sleep "$((DELAY_MINUTES * 60))"
            fi

            # Skip empty drafts
            if ! printf '%s' "$draft_body" | grep -qE '#[0-9]+|/pull/[0-9]+|/issues?/[0-9]+'; then
              echo "⏭️  Skipped: $name ($draft_tag), no PR entries"
              echo "- ⏭️ \`$name\` (\`$draft_tag\`): no PR entries" >> "$GITHUB_STEP_SUMMARY"
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi

            # Major detection via release-gate.sh (runs before cooldown
            # so major bumps still reach the major-gate even when the
            # draft body would otherwise classify as low-only).
            local prev_tag is_major
            prev_tag=$(find_prev_for_tag "$draft_tag")
            local body_tmp
            body_tmp=$(mktemp "${RUNNER_TEMP:-/tmp}/body.XXXXXX")
            printf '%s' "$draft_body" > "$body_tmp"
            is_major=$(detect_major_bump "$prev_tag" "$draft_tag" "$body_tmp" | cut -f1)
            rm -f "$body_tmp"

            if [ "$is_major" = "true" ] && [ "$SKIP_MAJOR" = "true" ]; then
              echo "🚧 Major bump detected: $name ($draft_tag), skipping"
              echo "- 🚧 \`$name\` (\`$draft_tag\`): **major, skipped**" >> "$GITHUB_STEP_SUMMARY"
              local title="Major release pending: ${draft_tag}"
              local existing
              existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
              if [ -z "$existing" ]; then
                gh issue create --title "$title" \
                  --body "Weekly auto-release detected a major bump for \`$draft_tag\`. Please review and publish manually." \
                  --label "release-automation" || true
              fi
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi

            # Pending-major check
            local title="Major release pending: ${draft_tag}"
            local existing
            existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
            if [ -n "$existing" ]; then
              echo "⏸️  Pending major issue #${existing}, skipping $name ($draft_tag)"
              echo "- ⏸️ \`$name\` (\`$draft_tag\`): pending-major #${existing}" >> "$GITHUB_STEP_SUMMARY"
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi

            # Gate low-priority drafts on per-package cooldown. Drafts
            # whose only entries fall under the configured low-priority
            # sections (default Maintenance/Documentation) are held
            # until enough weeks have elapsed since the previous
            # release of the same package. Reuses prev_tag from major
            # detection. Drafts with any other entry are released
            # regardless. Major bumps are handled above and never reach
            # this block.
            local classification
            classification=$(printf '%s' "$draft_body" | classify_draft_priority)
            if [ "$classification" = "empty" ]; then
              echo "⏭️  Skipped: $name ($draft_tag), no actionable entries"
              echo "- ⏭️ \`$name\` (\`$draft_tag\`): no actionable entries" >> "$GITHUB_STEP_SUMMARY"
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi
            if [ "$classification" = "low-only" ]; then
              local cd_weeks
              cd_weeks=$(weeks_since_release "$prev_tag")
              if [ "$cd_weeks" -lt "$COOLDOWN_WEEKS" ]; then
                local cd_remaining=$(( COOLDOWN_WEEKS - cd_weeks ))
                echo "⏸️  Cooldown: $name ($draft_tag), low-priority only, ${cd_weeks}w < ${COOLDOWN_WEEKS}w since ${prev_tag:-<none>} (${cd_remaining}w remaining)"
                echo "- ⏸️ \`$name\` (\`$draft_tag\`): cooldown ${cd_weeks}w/${COOLDOWN_WEEKS}w since \`${prev_tag:-<none>}\` (${cd_remaining}w remaining)" >> "$GITHUB_STEP_SUMMARY"
                ((skipped++)) || true
                echo "::endgroup::"
                return
              fi
              echo "ℹ️ $name ($draft_tag) is low-priority only but cooldown elapsed (${cd_weeks}w >= ${COOLDOWN_WEEKS}w). Releasing."
              echo "- ℹ️ \`$name\` (\`$draft_tag\`): low-only cooldown elapsed (${cd_weeks}w)" >> "$GITHUB_STEP_SUMMARY"
            fi

            # Publish (release notes are already cleaned in place by the
            # per-repo post-drafter cleanup workflow; this only flips
            # draft:false).
            echo "📦 Publishing $name ($draft_tag)..."
            echo "- 📦 \`$name\` (\`$draft_tag\`): preparing at $(date -u +%H:%M:%S) UTC..." >> "$GITHUB_STEP_SUMMARY"

            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍 Dry-run: $name ($draft_tag), would publish (no changes made)"
              echo "- 🔍 \`$name\` (\`$draft_tag\`): **dry-run**, would publish at $(date -u +%H:%M:%S) UTC" >> "$GITHUB_STEP_SUMMARY"
              run_hooks "$name" "$draft_tag" "$module_hooks"
              ((published++)) || true
              echo "::endgroup::"
            else
              local payload
              # Re-echo tag_name so GitHub keeps the draft's tag instead of
              # regenerating an "untagged-<sha>" tag on the PATCH.
              payload=$(jq -n --arg tag "$draft_tag" '{draft: false, tag_name: $tag}')
              if printf '%s' "$payload" | gh api --method PATCH "/repos/${GH_REPO}/releases/${draft_id}" --input - > /dev/null 2>&1; then
                echo "✅ Published: $name ($draft_tag)"
                echo "- ✅ \`$name\` (\`$draft_tag\`): **published** at $(date -u +%H:%M:%S) UTC" >> "$GITHUB_STEP_SUMMARY"
                run_hooks "$name" "$draft_tag" "$module_hooks"
                ((published++)) || true
              else
                echo "❌ FAILED: $name ($draft_tag)"
                echo "- ❌ \`$name\` (\`$draft_tag\`): **FAILED** at $(date -u +%H:%M:%S) UTC" >> "$GITHUB_STEP_SUMMARY"
                ((failed++)) || true
              fi
              echo "::endgroup::"
            fi
          }

          # ── Process waves from manifest ───────────────────────────
          for wi in $(seq 0 $((wave_count - 1))); do
            wave_name=$(yq ".waves[$wi].name" "$PLAN_PATH")
            auto_discover=$(yq ".waves[$wi].auto-discover // false" "$PLAN_PATH")

            echo ""
            echo "════════════════════════════════════════════"
            echo "  Wave $((wi+1))/$wave_count: $wave_name"
            echo "════════════════════════════════════════════"

            # Wave delay (skip before the very first wave)
            if [ "$wi" -gt 0 ] && [ "${WAVE_DELAY_MINUTES:-0}" -gt 0 ] && [ "$DRY_RUN" != "true" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "⏳ Wave delay: waiting ${WAVE_DELAY_MINUTES}m before wave $((wi+1)) ($wave_name)..."
              echo "⏳ Wave delay: waiting ${WAVE_DELAY_MINUTES}m before wave $((wi+1)) ($wave_name)..." >> "$GITHUB_STEP_SUMMARY"
              sleep "$((WAVE_DELAY_MINUTES * 60))"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ "$auto_discover" = "true" ]; then
              # ── Auto-discover: release all drafts not yet processed ──
              if [ -s "$RUNNER_TEMP/processed_tags.txt" ]; then
                processed=$(jq -R . "$RUNNER_TEMP/processed_tags.txt" | jq -s .)
                remaining=$(printf '%s' "$all_drafts" | jq --argjson done "$processed" \
                  '[.[] | select(.tag_name as $t | $done | index($t) | not)] | sort_by(.tag_name)')
              else
                remaining=$(printf '%s' "$all_drafts" | jq 'sort_by(.tag_name)')
              fi

              remaining_count=$(printf '%s' "$remaining" | jq 'length')
              echo "  Auto-discovered: $remaining_count remaining drafts"
              echo "### Wave $((wi+1)): $wave_name (auto-discover: $remaining_count drafts)" >> "$GITHUB_STEP_SUMMARY"

              if [ "$remaining_count" -eq 0 ]; then
                echo "- No remaining drafts to process." >> "$GITHUB_STEP_SUMMARY"
                continue
              fi

              for ri in $(seq 0 $((remaining_count - 1))); do
                draft=$(printf '%s' "$remaining" | jq ".[$ri]")
                draft_tag=$(printf '%s' "$draft" | jq -r '.tag_name')
                # Derive a display name from the tag (strip version suffix)
                name=$(printf '%s' "$draft_tag" | sed -E 's|/v[0-9].*||')
                process_module "$name" "$draft" "[]"
              done
            else
              # ── Explicit wave: process listed modules ────────────────
              module_count=$(yq ".waves[$wi].modules | length" "$PLAN_PATH")
              echo "### Wave $((wi+1)): $wave_name" >> "$GITHUB_STEP_SUMMARY"

              for mi in $(seq 0 $((module_count - 1))); do
                name=$(yq ".waves[$wi].modules[$mi].name" "$PLAN_PATH")
                tag_prefix=$(yq ".waves[$wi].modules[$mi].tag-prefix // \"\"" "$PLAN_PATH")
                hooks=$(yq -o=json ".waves[$wi].modules[$mi].post-release // []" "$PLAN_PATH")

                draft=$(find_draft "$tag_prefix")
                if [ -z "$draft" ]; then
                  echo "⏭️  No draft for $name (prefix: $tag_prefix)"
                  echo "- ⏭️ \`$name\`: no draft (prefix: \`$tag_prefix\`)" >> "$GITHUB_STEP_SUMMARY"
                  ((skipped++)) || true
                  continue
                fi

                process_module "$name" "$draft" "$hooks"
              done
            fi
          done

          # ── Top-level post-release hooks ────────────────────────────
          if [ "$published" -gt 0 ]; then
            top_hooks=$(yq -o=json '.post-release // []' "$PLAN_PATH")
            if [ "$top_hooks" != "[]" ] && [ "$top_hooks" != "null" ]; then
              echo ""
              echo "::group::🔔 Post-release hooks"
              echo "── Running top-level post-release hooks ──"
              echo "  Hooks: $top_hooks"
              if [ "$DRY_RUN" != "true" ]; then
                echo "⏳ Waiting 5m for registries to index..."
                sleep 300
              fi
              run_hooks "$(basename "${GH_REPO}")" "batch" "$top_hooks"
              echo "::endgroup::"
            fi
          else
            echo "ℹ️  No modules published; skipping post-release hooks."
          fi

          # ── Final summary ──────────────────────────────────────────
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  Results                                         ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  ✅ Published: $published"
          echo "║  ⏭️  Skipped:   $skipped"
          echo "║  ❌ Failed:    $failed"
          echo "╚══════════════════════════════════════════════════╝"
          {
            echo ""
            echo "### Results"
            echo "- Published: $published"
            echo "- Skipped: $skipped"
            echo "- Failed: $failed"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed module(s) failed to publish."
            exit 1
          fi
