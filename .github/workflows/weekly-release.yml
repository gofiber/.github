name: weekly-release

# Reusable, centrally hosted orchestrator for GoFiber's weekly auto-release.
#
# Auth: uses the caller's automatic GITHUB_TOKEN. Callers must grant
# permissions: contents:write, pull-requests:read, issues:write.
#
# Single-module (cli, utils, schema, multi-labeler):
#   Locates the newest draft, major-gate, cleanup, atomic publish.
#
# Multi-module (contrib, storage, template):
#   Reads a `release-plan.yml` manifest from the caller repo that defines
#   ordered "waves" of modules. Waves run sequentially (wave 2 waits for
#   wave 1). Modules within a wave run sequentially with a configurable
#   delay between publishes. Each module is matched to its draft release
#   via `tag-prefix`. Dependencies (e.g. socketioŌåÆwebsocket in contrib,
#   enginesŌåÆcore in template) are solved by putting the dependency in an
#   earlier wave.

on:
  workflow_call:
    inputs:
      repo-type:
        description: 'single | multi'
        required: true
        type: string
      draft-tags:
        description: >-
          Comma-separated filter for draft releases. Supports full tags
          (e.g. "v2.0.3") AND package names (e.g. "websocket", "redis").
          Matched as substrings against each draft's tag_name. Empty = all.
        required: false
        type: string
        default: ''
      release-plan-path:
        description: >-
          Path to the per-repo release plan manifest (waves + modules).
          Only read when repo-type=multi.
        required: false
        type: string
        default: .github/release-plan.yml
      config-repository:
        description: Repository hosting this reusable workflow and the composite action.
        required: false
        type: string
        default: gofiber/.github
      config-ref:
        description: Informational git ref of the central repo.
        required: false
        type: string
        default: main
      dry-run:
        description: When true, compute the cleaned body but do not publish.
        required: false
        type: boolean
        default: false
      skip-major:
        description: When true, major-version bumps are left as drafts with a tracking issue.
        required: false
        type: boolean
        default: true
      bot-logins:
        description: Extra bot keywords for the contributor filter, comma-separated.
        required: false
        type: string
        default: ''
      dedupe:
        description: Drop duplicate PR references across sections.
        required: false
        type: boolean
        default: true
      publish-delay-minutes:
        description: Delay (minutes) between module publishes in a multi-module wave.
        required: false
        type: string
        default: '2'
      wave-delay-minutes:
        description: Delay (minutes) between sequential waves.
        required: false
        type: string
        default: '0'
      post-release-events:
        description: >-
          Comma-separated repository_dispatch event types to fire after a
          successful single-module publish (e.g. "after-release,sync-docs").
          Requires the dispatch-token secret. Ignored for multi-module repos
          (use release-plan.yml post-release hooks instead).
        required: false
        type: string
        default: ''
    secrets:
      dispatch-token:
        description: >-
          PAT or GitHub App token with contents:write for cross-repo
          repository_dispatch. Falls back to GITHUB_TOKEN (same-repo only).
        required: false

permissions:
  contents: write
  pull-requests: read
  issues: write

# ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
jobs:

  # ŌöĆŌöĆ Single-module release ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  single-release:
    if: inputs.repo-type == 'single'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Locate draft release(s)
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DRAFT_TAGS: ${{ inputs.draft-tags }}
        shell: bash
        run: |
          set -euo pipefail
          releases=$(gh api "/repos/${GH_REPO}/releases" --paginate)
          drafts=$(printf '%s' "$releases" | jq '[.[] | select(.draft == true)] | sort_by(.created_at) | reverse')
          count=$(printf '%s' "$drafts" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "no-draft=true" >> "$GITHUB_OUTPUT"
            echo "Ōä╣’ĖÅ No draft release found ŌĆö nothing to publish this week." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## Available draft releases"
            echo ""
            echo "| Tag | Name | Created |"
            echo "|-----|------|---------|"
            printf '%s' "$drafts" | jq -r '.[] | "| `\(.tag_name)` | \(.name // "ŌĆö") | \(.created_at[:10]) |"'
            echo ""
            if [ -z "${DRAFT_TAGS}" ]; then
              echo "> Processing **all** drafts (no filter set)."
            else
              echo "> Filter active: \`${DRAFT_TAGS}\` (substring match)."
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${DRAFT_TAGS}" ]; then
            filters=$(printf '%s' "$DRAFT_TAGS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            drafts=$(printf '%s' "$drafts" | jq --argjson f "$filters" \
              '[.[] | select(.tag_name as $t | $f | any(. as $p | $t | contains($p)))]')
            count=$(printf '%s' "$drafts" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "no-draft=true" >> "$GITHUB_OUTPUT"
              echo "Ōä╣’ĖÅ No draft matched filter: ${DRAFT_TAGS}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          fi

          if [ "$count" -gt 1 ]; then
            echo "::warning::Found $count draft releases; using the newest."
          fi

          printf '%s' "$drafts" | jq '.[0]' > "$RUNNER_TEMP/draft.json"
          jq -r '.body // ""' "$RUNNER_TEMP/draft.json" > "$RUNNER_TEMP/draft_body.md"

          if ! grep -qE '#[0-9]+|/pull/[0-9]+|/issues?/[0-9]+' "$RUNNER_TEMP/draft_body.md"; then
            tag=$(jq -r '.tag_name' "$RUNNER_TEMP/draft.json")
            echo "no-draft=true" >> "$GITHUB_OUTPUT"
            echo "Ōä╣’ĖÅ Draft \`${tag}\` has no PR entries ŌĆö skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Skip if the only changes are CI (GitHub Actions) and/or documentation
          if ! awk '
            /^## .*Documentation/{ skip=1; next }
            /^## .*Maintenance/{ skip=2; next }
            /^## /{ skip=0 }
            skip==1{ next }
            skip==2 && /^- / && /actions\/|\.github\//{ next }
            /^- .*(#[0-9]+|\/(pull|issues?)\/[0-9]+)/{ found=1; exit }
            END{ exit !found }
          ' "$RUNNER_TEMP/draft_body.md"; then
            tag=$(jq -r '.tag_name' "$RUNNER_TEMP/draft.json")
            echo "no-draft=true" >> "$GITHUB_OUTPUT"
            echo "Ōä╣’ĖÅ Draft \`${tag}\` contains only CI/docs changes ŌĆö skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "no-draft=false"
            echo "id=$(jq -r '.id' "$RUNNER_TEMP/draft.json")"
            echo "tag_name=$(jq -r '.tag_name' "$RUNNER_TEMP/draft.json")"
            echo "name=$(jq -r '.name // ""' "$RUNNER_TEMP/draft.json")"
          } >> "$GITHUB_OUTPUT"

      - name: Determine previous tag and bump kind
        id: bump
        if: steps.draft.outputs.no-draft == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          prev=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "prev_tag=${prev}" >> "$GITHUB_OUTPUT"

          is_major=false
          reason=""
          if [ -n "$prev" ]; then
            prev_major=$(printf '%s' "$prev"    | sed -E 's/^v?([0-9]+).*/\1/')
            next_major=$(printf '%s' "$NEXT_TAG" | sed -E 's/^v?([0-9]+).*/\1/')
            if [ "$next_major" -gt "$prev_major" ] 2>/dev/null; then
              is_major=true
              reason="major segment bumped: ${prev} ŌåÆ ${NEXT_TAG}"
            fi
          fi

          if [ "$is_major" = "false" ]; then
            awk '/^## .*[Bb]reaking/{f=1;next}/^## /{f=0}f&&/^- /{print;exit}' \
              "$RUNNER_TEMP/draft_body.md" > "$RUNNER_TEMP/breaking.txt"
            if [ -s "$RUNNER_TEMP/breaking.txt" ]; then
              is_major=true
              reason="draft contains a non-empty Breaking Changes section"
            fi
          fi

          echo "is_major=${is_major}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}"    >> "$GITHUB_OUTPUT"
          echo "prev: ${prev:-<none>} | next: ${NEXT_TAG} | is_major=${is_major} (${reason:-no breaking signal})" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Major gate ŌĆö upsert tracking issue and skip
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major == 'true' &&
          inputs.skip-major
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
          PREV_TAG: ${{ steps.bump.outputs.prev_tag }}
          REASON:   ${{ steps.bump.outputs.reason }}
        shell: bash
        run: |
          set -euo pipefail
          title="Major release pending: ${NEXT_TAG}"
          draft_url="${GITHUB_SERVER_URL}/${GH_REPO}/releases/tag/${NEXT_TAG}"
          run_url="${GITHUB_SERVER_URL}/${GH_REPO}/actions/runs/${GITHUB_RUN_ID}"
          existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
          body="release-drafter has prepared \`${NEXT_TAG}\` (previous: \`${PREV_TAG:-<none>}\`).
          The weekly auto-release job skipped it because **${REASON}** and \`skip-major\` is on.

          Please review, edit the draft as needed, and publish manually.

          - Draft: ${draft_url}
          - Workflow run: ${run_url}"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Weekly run $(date -u +%FT%TZ) still sees the pending major release. ${run_url}"
          else
            gh issue create --title "$title" --body "$body" --label "release-automation"
          fi
          echo "­¤Ü¦ Major bump **skipped**: ${REASON}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check for open pending-major tracking issue
        id: pending
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          title="Major release pending: ${NEXT_TAG}"
          existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "ŌÅĖ’ĖÅ Skipping ŌĆö tracking issue #${existing} is still open for ${NEXT_TAG}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean and publish release
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true' &&
          steps.pending.outputs.pending != 'true'
        uses: gofiber/.github/.github/actions/clean-release-notes@main
        with:
          release-id: ${{ steps.draft.outputs.id }}
          bots: ${{ inputs.bot-logins }}
          dedupe: ${{ inputs.dedupe }}
          dry-run: ${{ inputs.dry-run }}
          publish: ${{ inputs.dry-run && 'false' || 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch post-release events
        if: >-
          steps.draft.outputs.no-draft == 'false' &&
          steps.bump.outputs.is_major != 'true' &&
          steps.pending.outputs.pending != 'true' &&
          !inputs.dry-run &&
          inputs.post-release-events != ''
        env:
          DISPATCH_TOKEN: ${{ secrets.dispatch-token || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENTS: ${{ inputs.post-release-events }}
          TAG: ${{ steps.draft.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -ra events <<< "$EVENTS"
          for event in "${events[@]}"; do
            event=$(printf '%s' "$event" | xargs)
            [ -z "$event" ] && continue
            payload=$(jq -n --arg tag "$TAG" --arg source "$GH_REPO" \
              '{tag: $tag, source_repository: $source}')
            if GH_TOKEN="$DISPATCH_TOKEN" gh api --method POST "/repos/${GH_REPO}/dispatches" \
              -f "event_type=${event}" \
              --argjson "client_payload" "$payload" 2>/dev/null; then
              echo "­¤öö Dispatched \`$event\` ŌåÆ \`$GH_REPO\`" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "ŌÜĀ’ĖÅ Failed to dispatch \`$event\` ŌåÆ \`$GH_REPO\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Summary
        if: always() && steps.draft.outputs.no-draft == 'false'
        env:
          NEXT_TAG: ${{ steps.draft.outputs.tag_name }}
          DRY_RUN:  ${{ inputs.dry-run }}
          PENDING:  ${{ steps.pending.outputs.pending }}
          IS_MAJOR: ${{ steps.bump.outputs.is_major }}
        shell: bash
        run: |
          set -eu
          case "${IS_MAJOR}/${PENDING}/${DRY_RUN}" in
            true/*/*)   echo "outcome: major-skip (${NEXT_TAG})" ;;
            */true/*)   echo "outcome: pending-major-open ŌĆö skipped (${NEXT_TAG})" ;;
            */*/true)   echo "outcome: dry-run (${NEXT_TAG}) ŌĆö no API write" ;;
            *)          echo "outcome: published (${NEXT_TAG})" ;;
          esac

  # ŌöĆŌöĆ Multi-module wave release ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  #
  # Reads release-plan.yml for explicit dependency waves, then auto-discovers
  # any remaining drafts that weren't listed and releases them in a final
  # "auto" wave. This means new packages are picked up automatically ŌĆö the
  # manifest only needs entries for modules with ordering constraints.
  multi-release:
    if: inputs.repo-type == 'multi'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout caller repo (for release-plan.yml)
        uses: actions/checkout@v5
        with:
          sparse-checkout: ${{ inputs.release-plan-path }}

      - name: Checkout central repo (for cleanup tool)
        uses: actions/checkout@v5
        with:
          repository: gofiber/.github
          path: .central

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .central/.github/actions/clean-release-notes/go.mod
          cache: false

      - name: Build cleanup tool
        shell: bash
        env:
          GOWORK: 'off'
        run: |
          cd .central/.github/actions/clean-release-notes
          go build -trimpath -o "$RUNNER_TEMP/release-notes-cleanup" ./

      - name: Process waves + auto-discover remaining
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TOKEN: ${{ secrets.dispatch-token || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DRAFT_TAGS: ${{ inputs.draft-tags }}
          DRY_RUN: ${{ inputs.dry-run }}
          SKIP_MAJOR: ${{ inputs.skip-major }}
          BOT_LOGINS: ${{ inputs.bot-logins }}
          DEDUPE: ${{ inputs.dedupe }}
          DELAY_MINUTES: ${{ inputs.publish-delay-minutes }}
          WAVE_DELAY_MINUTES: ${{ inputs.wave-delay-minutes }}
          PLAN_PATH: ${{ inputs.release-plan-path }}
        shell: bash
        run: |
          set -euo pipefail

          # ŌöĆŌöĆ Read manifest ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          if [ ! -f "$PLAN_PATH" ]; then
            echo "::error::Release plan not found: $PLAN_PATH"
            exit 1
          fi

          if ! command -v yq &>/dev/null; then
            wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            chmod +x /usr/local/bin/yq
          fi

          wave_count=$(yq '.waves | length // 0' "$PLAN_PATH")

          # ŌöĆŌöĆ Read delays from manifest (override workflow inputs) ŌöĆŌöĆ
          plan_wave_delay=$(yq '.wave-delay-minutes // ""' "$PLAN_PATH")
          plan_publish_delay=$(yq '.publish-delay-minutes // ""' "$PLAN_PATH")
          [ -n "$plan_wave_delay" ] && WAVE_DELAY_MINUTES="$plan_wave_delay"
          [ -n "$plan_publish_delay" ] && DELAY_MINUTES="$plan_publish_delay"

          # ŌöĆŌöĆ Fetch all releases once ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          releases=$(gh api "/repos/${GH_REPO}/releases" --paginate)
          all_drafts=$(printf '%s' "$releases" | jq '[.[] | select(.draft == true)]')

          {
            echo "## Available draft releases"
            echo ""
            echo "| Tag | Name | Created |"
            echo "|-----|------|---------|"
            printf '%s' "$all_drafts" | jq -r '.[] | "| `\(.tag_name)` | \(.name // "ŌĆö") | \(.created_at[:10]) |"'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Apply user filter if set
          if [ -n "$DRAFT_TAGS" ]; then
            filters=$(printf '%s' "$DRAFT_TAGS" | jq -R \
              'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
            all_drafts=$(printf '%s' "$all_drafts" | jq --argjson f "$filters" \
              '[.[] | select(.tag_name as $t | $f | any(. as $p | $t | contains($p)))]')
            echo "> Filter: \`$DRAFT_TAGS\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          # ŌöĆŌöĆ Execution plan ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          draft_count=$(printf '%s' "$all_drafts" | jq 'length')
          echo ""
          echo "ŌĢöŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢŚ"
          echo "ŌĢæ  Weekly Release ŌĆö Execution Plan                 ŌĢæ"
          echo "ŌĢĀŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢŻ"
          echo "ŌĢæ  Drafts found: $draft_count"
          echo "ŌĢæ  Waves:        $wave_count"
          echo "ŌĢæ  Module delay: ${DELAY_MINUTES}m"
          echo "ŌĢæ  Wave delay:   ${WAVE_DELAY_MINUTES:-0}m"
          echo "ŌĢæ  Dry-run:      $DRY_RUN"
          echo "ŌĢÜŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢØ"
          printf '%s' "$all_drafts" | jq -r '.[] | "  ŌåÆ \(.tag_name)"'
          echo ""

          # ŌöĆŌöĆ Track processed draft tags ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          > "$RUNNER_TEMP/processed_tags.txt"

          # ŌöĆŌöĆ Helpers ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          find_draft() {
            local prefix="$1"
            if [ -z "$prefix" ] || [ "$prefix" = "null" ]; then
              printf '%s' "$all_drafts" | jq \
                '[.[] | select(.tag_name | test("^v[0-9]"))] | sort_by(.created_at) | reverse | .[0] // empty'
            else
              printf '%s' "$all_drafts" | jq --arg p "$prefix" \
                '[.[] | select(.tag_name | startswith($p))] | sort_by(.created_at) | reverse | .[0] // empty'
            fi
          }

          find_prev() {
            local prefix="$1"
            if [ -z "$prefix" ] || [ "$prefix" = "null" ]; then
              printf '%s' "$releases" | jq -r \
                '[.[] | select(.draft == false and .prerelease == false and (.tag_name | test("^v[0-9]")))] | sort_by(.created_at) | reverse | .[0].tag_name // ""'
            else
              printf '%s' "$releases" | jq -r --arg p "$prefix" \
                '[.[] | select(.draft == false and .prerelease == false and (.tag_name | startswith($p)))] | sort_by(.created_at) | reverse | .[0].tag_name // ""'
            fi
          }

          find_prev_for_tag() {
            local tag="$1"
            # Extract the prefix (everything before the last /vN.N.N segment)
            local prefix=$(printf '%s' "$tag" | sed -E 's|(.*/)v[0-9].*|\1|')
            if [ "$prefix" = "$tag" ]; then prefix=""; fi
            find_prev "$prefix"
          }

          # ŌöĆŌöĆ run_hooks: execute post-release hooks for a module ŌöĆŌöĆŌöĆŌöĆ
          run_hooks() {
            local name="$1"
            local tag="$2"
            local hooks="$3"

            if [ -z "$hooks" ] || [ "$hooks" = "null" ] || [ "$hooks" = "[]" ]; then
              return
            fi

            local hook_count
            hook_count=$(printf '%s' "$hooks" | jq 'length')

            for hi in $(seq 0 $((hook_count - 1))); do
              local action
              action=$(printf '%s' "$hooks" | jq -r ".[$hi].action")

              case "$action" in
                dispatch)
                  local repo event directory ecosystem
                  repo=$(printf '%s' "$hooks" | jq -r ".[$hi].repo // \"${GH_REPO}\"")
                  event=$(printf '%s' "$hooks" | jq -r ".[$hi].event")
                  directory=$(printf '%s' "$hooks" | jq -r ".[$hi].directory // \"/\"")
                  ecosystem=$(printf '%s' "$hooks" | jq -r ".[$hi][\"package-ecosystem\"] // \"gomod\"")

                  local payload
                  payload=$(jq -n \
                    --arg module "$name" \
                    --arg tag "$tag" \
                    --arg source "$GH_REPO" \
                    --arg dir "$directory" \
                    --arg eco "$ecosystem" \
                    '{module: $module, tag: $tag, source_repository: $source, directory: $dir, package_ecosystem: $eco}')

                  if [ "$DRY_RUN" = "true" ]; then
                    echo "  - ­¤öö (dry-run) Would dispatch \`$event\` ŌåÆ \`$repo\`" >> "$GITHUB_STEP_SUMMARY"
                  else
                    if GH_TOKEN="$DISPATCH_TOKEN" gh api --method POST "/repos/${repo}/dispatches" \
                      -f "event_type=${event}" \
                      --argjson "client_payload" "$payload" 2>/dev/null; then
                      echo "  - ­¤öö Dispatched \`$event\` ŌåÆ \`$repo\`" >> "$GITHUB_STEP_SUMMARY"
                    else
                      echo "  - ŌÜĀ’ĖÅ Failed to dispatch \`$event\` ŌåÆ \`$repo\`" >> "$GITHUB_STEP_SUMMARY"
                    fi
                  fi
                  ;;
                *)
                  echo "  - ŌÜĀ’ĖÅ Unknown hook action: \`$action\`" >> "$GITHUB_STEP_SUMMARY"
                  ;;
              esac
            done
          }

          # ŌöĆŌöĆ process_module: shared logic for one draft release ŌöĆŌöĆŌöĆŌöĆŌöĆ
          published=0
          skipped=0
          failed=0
          is_first_module=true

          process_module() {
            local name="$1"
            local draft="$2"
            local module_hooks="${3:-[]}"

            local draft_id draft_tag draft_body
            draft_id=$(printf '%s' "$draft" | jq -r '.id')
            draft_tag=$(printf '%s' "$draft" | jq -r '.tag_name')
            draft_body=$(printf '%s' "$draft" | jq -r '.body // ""')

            echo "::group::­¤ō” $name ($draft_tag)"
            echo "ŌöĆŌöĆ Start: $name | Tag: $draft_tag ŌöĆŌöĆ"

            # Record as processed
            echo "$draft_tag" >> "$RUNNER_TEMP/processed_tags.txt"

            # Delay (skip before the very first module)
            if [ "$is_first_module" = "true" ]; then
              is_first_module=false
            elif [ "$DRY_RUN" != "true" ] && [ "$DELAY_MINUTES" -gt 0 ]; then
              echo "ŌÅ│ Waiting ${DELAY_MINUTES}m before \`$name\`..."
              sleep "$((DELAY_MINUTES * 60))"
            fi

            # Skip empty drafts
            if ! printf '%s' "$draft_body" | grep -qE '#[0-9]+|/pull/[0-9]+|/issues?/[0-9]+'; then
              echo "ŌÅŁ’ĖÅ  Skipped: $name ($draft_tag) ŌĆö no PR entries"
              echo "- ŌÅŁ’ĖÅ \`$name\` (\`$draft_tag\`): no PR entries" >> "$GITHUB_STEP_SUMMARY"
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi

            # Skip if the only changes are CI (GitHub Actions) and/or documentation
            if ! printf '%s' "$draft_body" | awk '
              /^## .*Documentation/{ skip=1; next }
              /^## .*Maintenance/{ skip=2; next }
              /^## /{ skip=0 }
              skip==1{ next }
              skip==2 && /^- / && /actions\/|\.github\//{ next }
              /^- .*(#[0-9]+|\/(pull|issues?)\/[0-9]+)/{ found=1; exit }
              END{ exit !found }
            '; then
              echo "ŌÅŁ’ĖÅ  Skipped: $name ($draft_tag) ŌĆö CI/docs changes only"
              echo "- ŌÅŁ’ĖÅ \`$name\` (\`$draft_tag\`): CI/docs only" >> "$GITHUB_STEP_SUMMARY"
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi

            # Major detection
            local prev_tag is_major=false
            prev_tag=$(find_prev_for_tag "$draft_tag")
            if [ -n "$prev_tag" ]; then
              local prev_v next_v
              prev_v=$(printf '%s' "$prev_tag" | sed -E 's/.*v([0-9]+)\..*/\1/')
              next_v=$(printf '%s' "$draft_tag" | sed -E 's/.*v([0-9]+)\..*/\1/')
              if [ "$next_v" -gt "$prev_v" ] 2>/dev/null; then
                is_major=true
              fi
            fi
            if [ "$is_major" = "false" ]; then
              if printf '%s' "$draft_body" | awk '/^## .*[Bb]reaking/{f=1;next}/^## /{f=0}f&&/^- /{print;exit}' | grep -q .; then
                is_major=true
              fi
            fi

            if [ "$is_major" = "true" ] && [ "$SKIP_MAJOR" = "true" ]; then
              echo "­¤Ü¦ Major bump detected: $name ($draft_tag) ŌĆö skipping"
              echo "- ­¤Ü¦ \`$name\` (\`$draft_tag\`): **major ŌĆö skipped**" >> "$GITHUB_STEP_SUMMARY"
              local title="Major release pending: ${draft_tag}"
              local existing
              existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
              if [ -z "$existing" ]; then
                gh issue create --title "$title" \
                  --body "Weekly auto-release detected a major bump for \`$draft_tag\`. Please review and publish manually." \
                  --label "release-automation" || true
              fi
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi

            # Pending-major check
            local title="Major release pending: ${draft_tag}"
            local existing
            existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')
            if [ -n "$existing" ]; then
              echo "ŌÅĖ’ĖÅ  Pending major issue #${existing} ŌĆö skipping $name ($draft_tag)"
              echo "- ŌÅĖ’ĖÅ \`$name\` (\`$draft_tag\`): pending-major #${existing}" >> "$GITHUB_STEP_SUMMARY"
              ((skipped++)) || true
              echo "::endgroup::"
              return
            fi

            # Cleanup
            echo "­¤¦╣ Cleaning release notes..."
            printf '%s' "$draft_body" > "$RUNNER_TEMP/original.md"
            local dedupe_flag="--dedupe=true"
            [ "$DEDUPE" = "false" ] && dedupe_flag="--dedupe=false"
            local bots_args=()
            [ -n "$BOT_LOGINS" ] && bots_args=(--bots "$BOT_LOGINS")

            "$RUNNER_TEMP/release-notes-cleanup" "${bots_args[@]}" "$dedupe_flag" \
              < "$RUNNER_TEMP/original.md" \
              > "$RUNNER_TEMP/cleaned.md" \
              2> "$RUNNER_TEMP/cleanup.log" || true

            # Publish or dry-run
            echo "­¤ō” Publishing $name ($draft_tag)..."
            echo "- ­¤ō” \`$name\` (\`$draft_tag\`): preparing at $(date -u +%H:%M:%S) UTC..." >> "$GITHUB_STEP_SUMMARY"

            if [ "$DRY_RUN" = "true" ]; then
              echo "­¤öŹ Dry-run: $name ($draft_tag) ŌĆö no changes made"
              echo "- ­¤öŹ \`$name\` (\`$draft_tag\`): **dry-run** at $(date -u +%H:%M:%S) UTC" >> "$GITHUB_STEP_SUMMARY"
              {
                echo "<details><summary>Diff for $name</summary>"
                echo ""
                echo '```diff'
                diff -u "$RUNNER_TEMP/original.md" "$RUNNER_TEMP/cleaned.md" || true
                echo '```'
                echo "</details>"
              } >> "$GITHUB_STEP_SUMMARY"
              run_hooks "$name" "$draft_tag" "$module_hooks"
              ((published++)) || true
              echo "::endgroup::"
            else
              local payload
              payload=$(jq -n --rawfile body "$RUNNER_TEMP/cleaned.md" '{body: $body, draft: false}')
              if printf '%s' "$payload" | gh api --method PATCH "/repos/${GH_REPO}/releases/${draft_id}" --input - > /dev/null 2>&1; then
                echo "Ō£ģ Published: $name ($draft_tag)"
                echo "- Ō£ģ \`$name\` (\`$draft_tag\`): **published** at $(date -u +%H:%M:%S) UTC" >> "$GITHUB_STEP_SUMMARY"
                run_hooks "$name" "$draft_tag" "$module_hooks"
                ((published++)) || true
              else
                echo "ŌØī FAILED: $name ($draft_tag)"
                echo "- ŌØī \`$name\` (\`$draft_tag\`): **FAILED** at $(date -u +%H:%M:%S) UTC" >> "$GITHUB_STEP_SUMMARY"
                ((failed++)) || true
              fi
              echo "::endgroup::"
            fi
          }

          # ŌöĆŌöĆ Process waves from manifest ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          for wi in $(seq 0 $((wave_count - 1))); do
            wave_name=$(yq ".waves[$wi].name" "$PLAN_PATH")
            auto_discover=$(yq ".waves[$wi].auto-discover // false" "$PLAN_PATH")

            echo ""
            echo "ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ"
            echo "  Wave $((wi+1))/$wave_count: $wave_name"
            echo "ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ"

            # Wave delay (skip before the very first wave)
            if [ "$wi" -gt 0 ] && [ "${WAVE_DELAY_MINUTES:-0}" -gt 0 ] && [ "$DRY_RUN" != "true" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "ŌÅ│ Wave delay: waiting ${WAVE_DELAY_MINUTES}m before wave $((wi+1)) ($wave_name)..."
              echo "ŌÅ│ Wave delay: waiting ${WAVE_DELAY_MINUTES}m before wave $((wi+1)) ($wave_name)..." >> "$GITHUB_STEP_SUMMARY"
              sleep "$((WAVE_DELAY_MINUTES * 60))"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ "$auto_discover" = "true" ]; then
              # ŌöĆŌöĆ Auto-discover: release all drafts not yet processed ŌöĆŌöĆ
              if [ -s "$RUNNER_TEMP/processed_tags.txt" ]; then
                processed=$(jq -R . "$RUNNER_TEMP/processed_tags.txt" | jq -s .)
                remaining=$(printf '%s' "$all_drafts" | jq --argjson done "$processed" \
                  '[.[] | select(.tag_name as $t | $done | index($t) | not)] | sort_by(.tag_name)')
              else
                remaining=$(printf '%s' "$all_drafts" | jq 'sort_by(.tag_name)')
              fi

              remaining_count=$(printf '%s' "$remaining" | jq 'length')
              echo "  Auto-discovered: $remaining_count remaining drafts"
              echo "### Wave $((wi+1)): $wave_name (auto-discover: $remaining_count drafts)" >> "$GITHUB_STEP_SUMMARY"

              if [ "$remaining_count" -eq 0 ]; then
                echo "- No remaining drafts to process." >> "$GITHUB_STEP_SUMMARY"
                continue
              fi

              for ri in $(seq 0 $((remaining_count - 1))); do
                draft=$(printf '%s' "$remaining" | jq ".[$ri]")
                draft_tag=$(printf '%s' "$draft" | jq -r '.tag_name')
                # Derive a display name from the tag (strip version suffix)
                name=$(printf '%s' "$draft_tag" | sed -E 's|/v[0-9].*||')
                process_module "$name" "$draft" "[]"
              done
            else
              # ŌöĆŌöĆ Explicit wave: process listed modules ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
              module_count=$(yq ".waves[$wi].modules | length" "$PLAN_PATH")
              echo "### Wave $((wi+1)): $wave_name" >> "$GITHUB_STEP_SUMMARY"

              for mi in $(seq 0 $((module_count - 1))); do
                name=$(yq ".waves[$wi].modules[$mi].name" "$PLAN_PATH")
                tag_prefix=$(yq ".waves[$wi].modules[$mi].tag-prefix // \"\"" "$PLAN_PATH")
                hooks=$(yq -o=json ".waves[$wi].modules[$mi].post-release // []" "$PLAN_PATH")

                draft=$(find_draft "$tag_prefix")
                if [ -z "$draft" ]; then
                  echo "ŌÅŁ’ĖÅ  No draft for $name (prefix: $tag_prefix)"
                  echo "- ŌÅŁ’ĖÅ \`$name\`: no draft (prefix: \`$tag_prefix\`)" >> "$GITHUB_STEP_SUMMARY"
                  ((skipped++)) || true
                  continue
                fi

                process_module "$name" "$draft" "$hooks"
              done
            fi
          done

          # ŌöĆŌöĆ Top-level post-release hooks ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          if [ "$published" -gt 0 ]; then
            top_hooks=$(yq -o=json '.post-release // []' "$PLAN_PATH")
            if [ "$top_hooks" != "[]" ] && [ "$top_hooks" != "null" ]; then
              echo ""
              echo "::group::­¤öö Post-release hooks"
              echo "ŌöĆŌöĆ Running top-level post-release hooks ŌöĆŌöĆ"
              if [ "$DRY_RUN" != "true" ]; then
                echo "ŌÅ│ Waiting 5m for registries to index..."
                sleep 300
              fi
              run_hooks "$(basename "${GH_REPO}")" "batch" "$top_hooks"
              echo "::endgroup::"
            fi
          else
            echo "Ōä╣’ĖÅ  No modules published ŌĆö skipping post-release hooks."
          fi

          # ŌöĆŌöĆ Final summary ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          echo ""
          echo "ŌĢöŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢŚ"
          echo "ŌĢæ  Results                                         ŌĢæ"
          echo "ŌĢĀŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢŻ"
          echo "ŌĢæ  Ō£ģ Published: $published"
          echo "ŌĢæ  ŌÅŁ’ĖÅ  Skipped:   $skipped"
          echo "ŌĢæ  ŌØī Failed:    $failed"
          echo "ŌĢÜŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢØ"
          {
            echo ""
            echo "### Results"
            echo "- Published: $published"
            echo "- Skipped: $skipped"
            echo "- Failed: $failed"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed module(s) failed to publish."
            exit 1
          fi
