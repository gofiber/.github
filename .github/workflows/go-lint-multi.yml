name: Linter (multi-module)

# Reusable, centrally hosted linter for multi-module GoFiber repos
# (contrib, storage, template).
#
# On push to main/master or workflow_dispatch: lints ALL modules.
# On pull_request: lints only modules whose files changed.
# Modules are auto-discovered by locating go.mod files under module-dir.

on:
  workflow_call:
    inputs:
      module-dir:
        description: >-
          Root directory for multi-module discovery (e.g. "v3", ".").
        required: false
        type: string
        default: '.'
      golangci-lint-version:
        description: 'golangci-lint version to use.'
        required: false
        type: string
        default: 'v2.6.2'
      golangci-lint-args:
        description: 'Additional args for golangci-lint (e.g. "--tests=false --timeout=5m").'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      packages: ${{ steps.set-packages.outputs.packages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history needed for dorny/paths-filter on PRs.
          # On push/dispatch this is unnecessary but harmless.
          fetch-depth: ${{ github.event_name == 'pull_request' && '0' || '1' }}

      - name: Discover modules
        id: discover
        env:
          MODULE_DIR: ${{ inputs.module-dir }}
        shell: bash
        run: |
          set -euo pipefail

          # Find all go.mod files under MODULE_DIR (skip vendor/testdata)
          if [ "$MODULE_DIR" = "." ]; then
            modules=$(find . -name go.mod -not -path ./go.mod \
              -not -path '*/vendor/*' -not -path '*/testdata/*' \
              | sed 's|/go.mod||; s|^\./||' | sort)
          else
            modules=$(find "$MODULE_DIR" -name go.mod \
              -not -path '*/vendor/*' -not -path '*/testdata/*' \
              | sed 's|/go.mod||; s|^\./||' | sort)
          fi

          if [ -z "$modules" ]; then
            echo "::warning::No Go modules found under ${MODULE_DIR}"
            echo "filters=" >> "$GITHUB_OUTPUT"
            echo "all=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build dorny/paths-filter YAML
          # _shared catches files at the module-dir root (e.g. .golangci.yml,
          # go.work) that affect all modules but live outside any single one.
          {
            echo "filters<<EOF"
            for mod in $modules; do
              echo "${mod}: \"${mod}/**\""
            done
            if [ "$MODULE_DIR" = "." ]; then
              echo '_shared: "*"'
            else
              echo "_shared: \"${MODULE_DIR}/*\""
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Build JSON array of all module paths
          all=$(printf '%s\n' $modules | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "all=${all}" >> "$GITHUB_OUTPUT"

      - name: Filter changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: ${{ steps.discover.outputs.filters }}

      - name: Set packages
        id: set-packages
        shell: bash
        run: |
          # Push / workflow_dispatch → all modules; PR → only changed modules
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changes='${{ steps.filter.outputs.changes }}'
            # If shared/root files changed, lint all modules
            if printf '%s' "$changes" | jq -e 'index("_shared")' > /dev/null 2>&1; then
              packages='${{ steps.discover.outputs.all }}'
            else
              packages="$changes"
            fi
          else
            packages='${{ steps.discover.outputs.all }}'
          fi
          [ -z "$packages" ] && packages="[]"
          echo "packages=${packages}" >> "$GITHUB_OUTPUT"

  lint:
    if: needs.changes.outputs.packages != '[]'
    name: "lint (${{ matrix.package }})"
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "${{ matrix.package }}/go.mod"
          cache-dependency-path: ${{ matrix.package }}/go.sum

      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        env:
          GOWORK: 'off'
        with:
          version: ${{ inputs.golangci-lint-version }}
          args: ${{ inputs.golangci-lint-args }}
          working-directory: ${{ matrix.package }}
          install-mode: goinstall
