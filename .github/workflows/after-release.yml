name: after-release

# Reusable workflow that waits for registries to index a new release,
# then triggers Dependabot in the given repos.

on:
  workflow_call:
    inputs:
      repos:
        description: 'Newline-separated list of repos to trigger.'
        required: true
        type: string
      delay-minutes:
        description: 'Minutes to wait for registries to index the new release.'
        required: false
        type: number
        default: 10
      skip-wait:
        description: 'Skip the registry wait (e.g. manual workflow_dispatch).'
        required: false
        type: boolean
        default: false
    secrets:
      dispatch-token:
        description: 'PAT with contents:write for cross-repo dispatch'
        required: true

permissions:
  contents: read

jobs:
  wait:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Wait for registries to index
        if: inputs.delay-minutes > 0 && !inputs.skip-wait
        run: |
          echo "⏳ Waiting ${{ inputs.delay-minutes }} minute(s) for registries to index..."
          sleep $(( ${{ inputs.delay-minutes }} * 60 ))

      - name: Build matrix
        id: parse
        run: |
          matrix=$(echo "$REPOS" | sed 's/^[[:space:]]*-[[:space:]]*//' | grep -v '^\s*$' | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
        env:
          REPOS: ${{ inputs.repos }}

  trigger:
    needs: wait
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.wait.outputs.matrix) }}
    steps:
      - uses: gofiber/.github/.github/actions/trigger-dependabot@main
        with:
          repo: ${{ matrix.repo }}
          token: ${{ secrets.dispatch-token }}
