name: go-test

on:
  workflow_call:
    inputs:
      go-versions:
        description: JSON array of Go versions for the test matrix
        required: false
        default: '["1.25.x"]'
        type: string
      platforms:
        description: JSON array of platforms to test against
        required: false
        default: '["ubuntu-latest", "windows-latest", "macos-latest"]'
        type: string
      working-directory:
        description: Path to the module to test
        required: false
        default: '.'
        type: string
      package-pattern:
        description: Go package pattern to test
        required: false
        default: ./...
        type: string
      gotestsum-version:
        description: gotestsum version to use
        required: false
        default: v1.13.0
        type: string
      rerun-fails:
        description: Rerun failed unit tests up to N times to absorb flakes (0 disables)
        required: false
        default: '2'
        type: string
      codecov-flags:
        description: Flags to pass to Codecov uploads
        required: false
        default: unittests
        type: string
      codecov-slug:
        description: Repository slug to use for Codecov uploads
        required: false
        default: ${{ github.repository }}
        type: string
      enable-codecov:
        description: Upload coverage reports to Codecov for Linux runs
        required: false
        default: true
        type: boolean
      enable-repeated:
        description: Run the repeated stress test job
        required: false
        default: true
        type: boolean
    secrets:
      codecov-token:
        description: Token for Codecov uploads
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        go-version: ${{ fromJson(inputs.go-versions) }}
        platform: ${{ fromJson(inputs.platforms) }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Test
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          version: ${{ inputs.gotestsum-version }}
          working-directory: ${{ inputs.working-directory }}
          packages: ${{ inputs.package-pattern }}
          rerun-fails: ${{ inputs.rerun-fails }}
          args: -race -count=1 -coverprofile=coverage.txt -covermode=atomic -shuffle=on

      - name: Upload coverage reports to Codecov
        if: ${{ inputs.enable-codecov && matrix.platform == 'ubuntu-latest' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.codecov-token }}
          flags: ${{ inputs.codecov-flags }}
          slug: ${{ inputs.codecov-slug }}
          verbose: true
          files: ${{ inputs.working-directory }}/coverage.txt

  repeated:
    if: inputs.enable-repeated == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Test
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          version: ${{ inputs.gotestsum-version }}
          working-directory: ${{ inputs.working-directory }}
          args: ${{ inputs.package-pattern }} -race -count=15 -shuffle=on
