name: security-golang

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the Go module to scan
        required: false
        default: '.'
        type: string
      run-govulncheck:
        description: Run govulncheck against the module
        required: false
        default: true
        type: boolean
      run-codeql:
        description: Run CodeQL analysis for Go
        required: false
        default: false
        type: boolean
      go-version:
        description: Go version for govulncheck
        required: false
        default: 'stable'
        type: string

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  govulncheck:
    if: inputs.run-govulncheck == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GO111MODULE: on
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ inputs.go-version }}
          check-latest: true
          cache-dependency-path: '**/go.sum'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ inputs.working-directory }}
        run: govulncheck ./...

  codeql:
    if: inputs.run-codeql == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
