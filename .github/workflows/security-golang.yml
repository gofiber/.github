name: security-golang

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the Go module to scan
        required: false
        default: '.'
        type: string
      run-govulncheck:
        description: Run govulncheck against the module
        required: false
        default: true
        type: boolean
      run-codeql:
        description: Run CodeQL analysis for Go
        required: false
        default: false
        type: boolean
      go-version:
        description: Go version for govulncheck
        required: false
        default: 'stable'
        type: string

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  govulncheck:
    if: inputs.run-govulncheck == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GO111MODULE: on
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version }}
          check-latest: true
          cache-dependency-path: '**/go.sum'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ inputs.working-directory }}
        run: govulncheck ./...

  codeql:
    if: inputs.run-codeql == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
