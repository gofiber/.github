name: sync-docs

# Reusable workflow for syncing documentation to the central docs repo.
#
# Modes:
#   push        — rsync current docs from source to docs repo
#   release     — create Docusaurus version snapshot for one tag
#   release-all — fetch all latest releases, create version snapshots
#
# The central script lives at .github/scripts/sync_docs.sh in this repo.
# Caller workflows in each GoFiber repo are thin wrappers (~25 lines).

on:
  workflow_call:
    inputs:
      repo-type:
        description: 'single (one go.mod) or multi (many modules)'
        type: string
        default: single
      source-dir:
        description: 'Path in the source repo containing docs to sync'
        type: string
        default: '.'
      destination-dir:
        description: 'Path in the docs repo where files are written'
        type: string
        required: true
      version-file:
        description: 'Docusaurus versions JSON file name (empty = no versioning)'
        type: string
        default: ''
      docusaurus-command:
        description: 'Docusaurus versioning command (empty = skip)'
        type: string
        default: ''
      file-patterns:
        description: 'Comma-separated file patterns to sync (e.g. "*.md" or "*.md,*.png")'
        type: string
        default: '*.md'
      exclude-patterns:
        description: 'Comma-separated directories to exclude (e.g. "vendor,.github")'
        type: string
        default: ''
      commit-url:
        description: 'Base URL for commit/release links in commit messages'
        type: string
        default: ''
      event-mode:
        description: 'push | release | release-all'
        type: string
        required: true
      tag-name:
        description: 'Release tag (required for release mode)'
        type: string
        default: ''
      node-version:
        description: 'Node.js version for Docusaurus'
        type: string
        default: '24'
    secrets:
      doc-sync-token:
        description: 'Token with push access to gofiber/docs'
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Checkout central scripts
        uses: actions/checkout@v6
        with:
          repository: gofiber/.github
          path: .central

      - name: Setup Node.js
        if: inputs.event-mode == 'release' || inputs.event-mode == 'release-all'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Sync docs
        env:
          TOKEN: ${{ secrets.doc-sync-token }}
          EVENT: ${{ inputs.event-mode }}
          TAG_NAME: ${{ inputs.tag-name }}
          REPO_TYPE: ${{ inputs.repo-type }}
          SOURCE_DIR: ${{ inputs.source-dir }}
          DESTINATION_DIR: ${{ inputs.destination-dir }}
          VERSION_FILE: ${{ inputs.version-file }}
          DOCUSAURUS_COMMAND: ${{ inputs.docusaurus-command }}
          FILE_PATTERNS: ${{ inputs.file-patterns }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
          COMMIT_URL: ${{ inputs.commit-url }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: bash .central/.github/scripts/sync_docs.sh
