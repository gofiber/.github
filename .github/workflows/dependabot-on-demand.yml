name: dependabot-on-demand

# Reusable workflow that triggers native Dependabot by toggling the
# executable bit on .github/dependabot.yml. Dependabot detects the
# config change and re-evaluates all dependency updates.
# PRs come from dependabot[bot] — auto-merge works as usual.

on:
  workflow_call:
    secrets:
      push-token:
        description: 'PAT with push access (for protected branches). Falls back to github.token.'
        required: false

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.push-token || github.token }}

      - name: Trigger Dependabot
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repository }}
        run: |
          file=".github/dependabot.yml"
          [ -x "$file" ] && chmod -x "$file" || chmod +x "$file"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # When triggered by a cross-repo release dispatch, name the source
          # repo in the commit so it is clear what initiated the update.
          if [ -n "${SOURCE_REPO:-}" ]; then
            msg="chore(ci): trigger dependabot after ${SOURCE_REPO} release [skip ci]"
          else
            msg="chore(ci): trigger dependabot [skip ci]"
          fi

          git commit -am "$msg"
          git push
