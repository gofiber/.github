name: dependabot-on-demand

# Reusable workflow that triggers native Dependabot by toggling the
# executable bit on .github/dependabot.yml. Dependabot detects the
# config change and re-evaluates all dependency updates.
# PRs come from dependabot[bot] — auto-merge works as usual.

on:
  workflow_call:
    secrets:
      push-token:
        description: 'PAT with push access (for protected branches). Falls back to github.token.'
        required: false

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.push-token || github.token }}

      - name: Trigger Dependabot
        run: |
          file=".github/dependabot.yml"
          [ -x "$file" ] && chmod -x "$file" || chmod +x "$file"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -am "chore(ci): trigger dependabot [skip ci]"
          git push
