name: dependabot-on-demand

# Reusable workflow that runs the official Dependabot CLI to check for
# dependency updates on-demand. Reads the caller repo's .github/dependabot.yml,
# converts it to CLI job files, runs the updater, and creates PRs.
#
# Security: two-job split. Job 1 runs the CLI with read-only permissions
# (ecosystems may execute arbitrary code in Docker). Job 2 has write
# permissions and only processes the JSONL output to create PRs.

on:
  workflow_call:
    inputs:
      ecosystems:
        description: >-
          Comma-separated ecosystem filter (e.g. "gomod,github-actions").
          Empty = all configured ecosystems.
        required: false
        type: string
        default: ''
      branch:
        description: Target branch.
        required: false
        type: string
        default: main

jobs:
  # ── Job 1: Run Dependabot CLI (read-only) ────────────────────────────────
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          path: repo

      - name: Download Dependabot CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo dependabot/cli -p "*linux-amd64.tar.gz"
          tar xzf *.tar.gz >/dev/null 2>&1
          ./dependabot --version

      - name: Install yq
        run: |
          if ! command -v yq &>/dev/null; then
            wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            chmod +x /usr/local/bin/yq
          fi

      - name: Convert dependabot.yml to CLI job files
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ inputs.branch }}
          FILTER: ${{ inputs.ecosystems }}
        run: |
          set -euo pipefail

          config="repo/.github/dependabot.yml"
          > /tmp/jobs.txt

          if [ ! -f "$config" ]; then
            echo "No dependabot.yml found — skipping."
            exit 0
          fi

          # Ecosystem name mapping (dependabot.yml → CLI)
          map_ecosystem() {
            case "$1" in
              gomod)          echo "go_modules" ;;
              github-actions) echo "github_actions" ;;
              npm)            echo "npm_and_yarn" ;;
              *)              echo "$1" ;;
            esac
          }

          # Parse filter
          IFS=',' read -ra filter_list <<< "${FILTER:-}"

          update_count=$(yq '.updates | length' "$config")

          for i in $(seq 0 $((update_count - 1))); do
            ecosystem=$(yq ".updates[$i].package-ecosystem" "$config")

            # Apply filter
            if [ -n "${FILTER:-}" ]; then
              match=false
              for f in "${filter_list[@]}"; do
                [ "$(echo "$f" | xargs)" = "$ecosystem" ] && match=true
              done
              [ "$match" = "false" ] && continue
            fi

            pm=$(map_ecosystem "$ecosystem")
            directory=$(yq ".updates[$i].directory // \"/\"" "$config")
            job_file="/tmp/job-${i}.yml"

            # Build job section
            cat > "$job_file" << JOBEOF
          job:
            package-manager: ${pm}
            allowed-updates:
              - dependency-type: direct
                update-type: all
            source:
              provider: github
              repo: ${REPO}
              directory: "${directory}"
              branch: ${BRANCH}
          JOBEOF

            # Add dependency groups if present (must be inside job: block)
            group_count=$(yq ".updates[$i].groups | length // 0" "$config")
            if [ "$group_count" -gt 0 ]; then
              {
                echo "  dependency-groups:"
                for g in $(yq ".updates[$i].groups | keys | .[]" "$config"); do
                  echo "    - name: ${g}"
                  echo "      rules:"
                  pattern_count=$(yq ".updates[$i].groups.${g}.patterns | length // 0" "$config")
                  if [ "$pattern_count" -gt 0 ]; then
                    echo "        patterns:"
                    for p in $(seq 0 $((pattern_count - 1))); do
                      pattern=$(yq ".updates[$i].groups.${g}.patterns[$p]" "$config")
                      echo "          - \"${pattern}\""
                    done
                  fi
                done
              } >> "$job_file"
            fi

            # Add credentials section (after job: block)
            cat >> "$job_file" << 'CREDEOF'
          credentials:
            - type: git_source
              host: github.com
              username: x-access-token
              password: $GITHUB_TOKEN
          CREDEOF

            echo "${pm}|${directory}|${job_file}" >> /tmp/jobs.txt
            echo "Generated job file for ${ecosystem} (${directory})"
          done

      - name: Run Dependabot CLI
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          > result.jsonl

          if [ ! -s /tmp/jobs.txt ]; then
            echo "No jobs to run."
            exit 0
          fi

          while IFS='|' read -r pm dir job_file; do
            echo "🔍 Checking ${pm} (${dir})..."
            ./dependabot update -f "$job_file" --local repo --timeout 20m >> result.jsonl || true
            echo "   Done."
          done < /tmp/jobs.txt

          # Show summary
          create_count=$(jq -c 'select(.type == "create_pull_request")' result.jsonl 2>/dev/null | wc -l || echo 0)
          update_count=$(jq -c 'select(.type == "update_pull_request")' result.jsonl 2>/dev/null | wc -l || echo 0)
          echo ""
          echo "📊 Results: ${create_count} new update(s), ${update_count} existing PR update(s)"

      - uses: actions/upload-artifact@v4
        with:
          name: dependabot-result
          path: result.jsonl

  # ── Job 2: Create PRs (write permissions) ────────────────────────────────
  create-prs:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dependabot-result

      - name: Create or update PRs from Dependabot output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ ! -s result.jsonl ]; then
            echo "No updates found."
            exit 0
          fi

          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git config user.name "dependabot[bot]"

          count=$(jq -c 'select(.type == "create_pull_request" or .type == "update_pull_request")' result.jsonl | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No PRs to create."
            exit 0
          fi

          echo "Processing ${count} update(s)..."

          jq -c 'select(.type == "create_pull_request" or .type == "update_pull_request")' result.jsonl | while read -r event; do
            PR_TITLE=$(printf '%s' "$event" | jq -r '.data."pr-title"')
            PR_BODY=$(printf '%s' "$event" | jq -r '.data."pr-body"')
            COMMIT_MSG=$(printf '%s' "$event" | jq -r '.data."commit-message"')
            BASE_SHA=$(printf '%s' "$event" | jq -r '.data."base-commit-sha"')
            BRANCH_NAME="dependabot/$(printf '%s' "$COMMIT_MSG" | sha1sum | cut -d' ' -f1)"

            echo ""
            echo "📦 ${PR_TITLE}"
            echo "   Branch: ${BRANCH_NAME}"

            # Checkout base and create branch
            git fetch origin
            git checkout "$BASE_SHA" 2>/dev/null
            git checkout -B "$BRANCH_NAME"

            # Apply file changes
            printf '%s' "$event" | jq -c '.data."updated-dependency-files"[]' | while read -r file; do
              FILE_PATH=$(printf '%s' "$file" | jq -r '(.directory + "/" + .name)' | sed 's|^/||')
              DELETED=$(printf '%s' "$file" | jq -r '.deleted')
              if [ "$DELETED" = "true" ]; then
                git rm -f "$FILE_PATH" 2>/dev/null || true
              else
                mkdir -p "$(dirname "$FILE_PATH")"
                printf '%s' "$file" | jq -r '.content' > "$FILE_PATH"
                git add "$FILE_PATH"
              fi
            done

            # Commit and push
            git commit -m "$COMMIT_MSG" || { echo "   ⏭️ No changes to commit"; git checkout main; continue; }
            git push -f origin "$BRANCH_NAME"

            # Create or update PR
            existing=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number // ""' 2>/dev/null || true)
            if [ -n "$existing" ]; then
              echo "   🔄 Updating PR #${existing}"
              gh pr edit "$existing" --title "$PR_TITLE" --body "$PR_BODY" || true
            else
              echo "   ✅ Creating PR"
              gh pr create \
                --title "$PR_TITLE" \
                --body "$PR_BODY" \
                --head "$BRANCH_NAME" \
                --label "🤖 Dependencies" \
                || true
            fi

            git checkout main 2>/dev/null || true
          done
