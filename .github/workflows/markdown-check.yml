name: markdown-check

on:
  workflow_call:
    inputs:
      globs:
        description: Newline-separated globs passed to markdownlint-cli2
        required: false
        default: |
          **/*.md
          #vendor
        type: string
      config:
        description: Optional path to a markdownlint config file
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: ${{ inputs.globs }}
          config: ${{ inputs.config }}
