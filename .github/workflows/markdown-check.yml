name: markdown-check

on:
  workflow_call:
    inputs:
      globs:
        description: Newline-separated globs passed to markdownlint-cli2
        required: false
        default: |
          **/*.md
          #vendor
        type: string
      config:
        description: Optional path to a markdownlint config file
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24.1.0
        with:
          globs: ${{ inputs.globs }}
          config: ${{ inputs.config }}
