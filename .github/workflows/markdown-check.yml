name: markdown-check

on:
  workflow_call:
    inputs:
      globs:
        description: Newline-separated globs passed to markdownlint-cli2
        required: false
        default: |
          **/*.md
          #vendor
        type: string
      config:
        description: Optional path to a markdownlint config file
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          globs: ${{ inputs.globs }}
          config: ${{ inputs.config }}
