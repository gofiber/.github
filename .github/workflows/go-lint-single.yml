name: Linter (single-module)

# Reusable, centrally hosted linter for single-module GoFiber repos
# (fiber, utils, cli, schema, boilerplate).
# Runs golangci-lint once at the repo root.

on:
  workflow_call:
    inputs:
      golangci-lint-version:
        description: 'golangci-lint version to use.'
        required: false
        type: string
        default: 'v2.6.2'
      golangci-lint-args:
        description: 'Additional args for golangci-lint (e.g. "--tests=false --timeout=5m").'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: ${{ inputs.golangci-lint-version }}
          args: ${{ inputs.golangci-lint-args }}
          install-mode: goinstall
