name: Org Health

on:
  schedule:
    - cron: '*/30 * * * *' # failure scan
    # 08:15 keeps the digest off the scan's :00/:30 grid; both crons firing in
    # the same minute would queue two runs into the concurrency group, where a
    # still-running scan lets one pending run displace the other.
    - cron: '15 8 * * *' # daily digest
  workflow_dispatch:
    inputs:
      mode:
        description: Check mode
        required: false
        default: scan
        type: choice
        options:
          - scan
          - digest
      dry_run:
        description: Print findings instead of posting to Discord
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false # org-health has no dependencies, there is no go.sum to key a cache on

      - name: Restore state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: org-health/state.json
          key: org-health-state-${{ github.run_id }}
          restore-keys: |
            org-health-state-

      - name: Run health check
        working-directory: org-health
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_HEALTH }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || (github.event.schedule == '15 8 * * *' && 'digest' || 'scan') }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
        run: go run .

      - name: Save state
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: org-health/state.json
          key: org-health-state-${{ github.run_id }}
