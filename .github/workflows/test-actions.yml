name: test-actions

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/workflows/test-actions.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      go-modules: ${{ steps.go.outputs.modules }}
      has-go: ${{ steps.go.outputs.has-modules }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Discover Go modules with tests
        id: go
        shell: bash
        run: |
          set -euo pipefail
          json=$(
            find .github/actions -name go.mod -type f -exec dirname {} \; \
              | sort -u \
              | while read -r dir; do
                  if find "$dir" -name '*_test.go' -print -quit | grep -q .; then
                    echo "$dir"
                  fi
                done \
              | jq -Rcn '[inputs]'
          )
          echo "modules=$json" >> "$GITHUB_OUTPUT"
          if [ "$json" = "[]" ]; then
            echo "has-modules=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-modules=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered: $json"

  go:
    needs: discover
    if: needs.discover.outputs.has-go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.go-modules) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Test ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go test ./... -race -count=1 -shuffle=on
